<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expert Insights Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#F4F6F8; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.container { max-width:600px; width:100%; padding:40px 20px; }
.logo { text-align:center; margin-bottom:32px; }
.logo h1 { font-size:24px; color:#0B1D3A; margin-bottom:4px; }
.logo p { color:#6B7280; font-size:14px; }
.tools { display:flex; flex-direction:column; gap:12px; }
.tool-card {
  display:flex; align-items:center; gap:16px;
  background:#fff; border:1px solid #E5E7EB; border-radius:12px;
  padding:20px 24px; text-decoration:none; color:inherit;
  transition:all 0.15s;
}
.tool-card:hover { border-color:#2563EB; box-shadow:0 4px 12px rgba(37,99,235,0.1); transform:translateY(-1px); }
.tool-icon { font-size:28px; width:48px; height:48px; display:flex; align-items:center; justify-content:center; background:#EFF6FF; border-radius:10px; flex-shrink:0; }
.tool-info h2 { font-size:16px; font-weight:600; color:#0B1D3A; margin-bottom:2px; }
.tool-info p { font-size:13px; color:#6B7280; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>Expert Insights</h1>
    <p>Internal Tools</p>
  </div>
  <div class="tools">
    <a href="proposals.html" class="tool-card">
      <div class="tool-icon">📋</div>
      <div class="tool-info">
        <h2>Proposal Manager</h2>
        <p>Create and manage campaign proposals and insertion orders</p>
      </div>
    </a>
    <a href="dashboard.html" class="tool-card">
      <div class="tool-icon">📊</div>
      <div class="tool-info">
        <h2>Audience Dashboard</h2>
        <p>Live campaign performance reporting with Bombora data</p>
      </div>
    </a>
  </div>
</div>
</body>
</html>
