<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Graphic Builder · EI Tools</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1e2a36; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ─── TOPBAR (matches hub) ─── */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 48px; background: linear-gradient(135deg, #0C1222, #162040, #1a2d5a); flex-shrink: 0; }
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar-logo img { height: 22px; width: auto; }
.topbar-title { color: #fff; font-size: 14px; font-weight: 600; }
.topbar-title span { opacity: 0.6; font-weight: 400; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.15s; }
.topbar-back:hover { color: #fff; }

/* ─── MAIN LAYOUT ─── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ─── PREVIEW PANE ─── */
.preview-pane { flex: 1; overflow: auto; background: #e8ecf0; padding: 28px 24px; }
.preview-inner { display: flex; flex-direction: column; align-items: center; min-height: min-content; }
.preview-hint { font-size: 12px; color: #6b7a8d; margin-bottom: 12px; text-align: center; flex-shrink: 0; }
.preview-wrap { box-shadow: 0 8px 32px rgba(0,0,0,0.12); border-radius: 4px; overflow: visible; flex-shrink: 0; margin-bottom: 28px; }

/* ─── THE GRAPHIC (what gets exported) ─── */
.graphic { width: 630px; background: #f5f6f8; }
.graphic-header { padding: 40px 40px 32px; text-align: center; color: #fff; }
.graphic-logo { height: 40px; margin-bottom: 4px; }
.graphic-headline { font-size: 38px; font-weight: 800; line-height: 1.15; margin: 12px 0; outline: none; }
.graphic-subtext { font-size: 16px; font-weight: 400; opacity: 0.88; line-height: 1.5; max-width: 460px; margin: 0 auto; outline: none; }
.graphic-urgency { background: #e8f0f8; padding: 12px 24px; text-align: center; }
.graphic-urgency-text { font-size: 13px; font-weight: 700; color: #0b3d6e; letter-spacing: 0.6px; outline: none; }
.graphic-tiers { padding: 24px 32px 8px; }

/* tier card */
.tier-card { margin-bottom: 20px; position: relative; }
.tier-badge { display: inline-block; background: #0b3d6e; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 1.2px; padding: 4px 12px; border-radius: 8px 8px 0 0; margin-left: 0; position: relative; margin-bottom: -2px; z-index: 1; }
.tier-badge [contenteditable] { outline: none; }
.tier-inner { background: #fff; border-radius: 8px; padding: 28px 28px 24px; }
.tier-inner.featured { border: 2px solid #1a6fb5; border-radius: 0 8px 8px 8px; }
.tier-inner.standard { border: 1px solid #dde2e8; }
.tier-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.tier-icon { font-size: 22px; color: #c0392b; }
.tier-name { font-size: 24px; font-weight: 700; color: #0b3d6e; outline: none; }

/* sections within tier */
.tier-section { margin-bottom: 12px; }
.tier-section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; margin-top: 8px; outline: none; }
.tier-section-label.highlight { color: #c0392b; }
.tier-section-label.normal { color: #8093a3; }
.tier-bullet { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; font-size: 15px; line-height: 1.5; }
.tier-bullet-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
.tier-bullet-dot.highlight { background: #c0392b; }
.tier-bullet-dot.normal { background: #4a5568; }
.tier-bullet span { outline: none; }
.tier-footer { border-top: 2px solid #e8ecf0; margin-top: 16px; padding-top: 16px; display: flex; justify-content: space-between; align-items: center; }
.tier-price { font-size: 22px; font-weight: 800; color: #0e1b2a; outline: none; }
.tier-guarantee { background: #f0f5e9; color: #3a6e1c; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; border: 1px solid #c5ddb0; }
.tier-guarantee span { outline: none; }

/* add-on */
.graphic-addon { background: #edf1f5; padding: 28px 40px 32px; text-align: center; border-top: 1px solid #dde2e8; }
.addon-label { font-size: 11px; font-weight: 700; color: #8093a3; letter-spacing: 1.5px; margin-bottom: 6px; outline: none; }
.addon-title { font-size: 20px; font-weight: 700; color: #0b3d6e; margin-bottom: 10px; outline: none; }
.addon-desc { font-size: 14px; color: #4a5568; line-height: 1.6; max-width: 440px; margin: 0 auto 14px; outline: none; }
.addon-cta { font-size: 15px; font-weight: 700; color: #c0392b; outline: none; }

/* ─── CONTROLS PANEL ─── */
.controls { width: 360px; flex-shrink: 0; background: #fff; border-left: 1px solid #e2e8f0; overflow-y: auto; padding: 20px 18px; font-size: 13px; }
.controls-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.controls-title { font-size: 16px; font-weight: 700; color: #0e1b2a; }
.btn-export { font-size: 13px; padding: 8px 18px; border-radius: 6px; border: none; background: #0b3d6e; color: #fff; cursor: pointer; font-weight: 700; font-family: inherit; transition: background 0.15s; }
.btn-export:hover { background: #0a3360; }
.btn-export:disabled { background: #8093a3; cursor: not-allowed; }

.ctrl-section { border-bottom: 1px solid #e8ecf0; padding-bottom: 16px; margin-bottom: 16px; }
.ctrl-section:last-child { border-bottom: none; }
.ctrl-section-title { font-weight: 700; color: #0b3d6e; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.ctrl-label { font-size: 11px; font-weight: 600; color: #6b7a8d; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.ctrl-row { margin-bottom: 10px; }
.ctrl-input { width: 100%; padding: 8px 10px; border: 1px solid #d1d9e0; border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; }
.ctrl-textarea { width: 100%; padding: 8px 10px; border: 1px solid #d1d9e0; border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; height: 60px; resize: vertical; }
.ctrl-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
.ctrl-color-row { display: flex; gap: 10px; }
.ctrl-color-group { flex: 1; }
.ctrl-color-inner { display: flex; gap: 6px; align-items: center; }
.ctrl-color-input { width: 32px; height: 28px; border: none; padding: 0; cursor: pointer; }

.btn-sm { font-size: 12px; padding: 5px 12px; border-radius: 5px; border: 1px solid #d1d9e0; background: #f8f9fb; cursor: pointer; font-weight: 600; color: #3a4a5c; font-family: inherit; transition: background 0.1s; }
.btn-sm:hover { background: #eef1f4; }
.btn-danger { font-size: 12px; padding: 5px 12px; border-radius: 5px; border: 1px solid #e8c4c0; background: #f8f9fb; cursor: pointer; font-weight: 600; color: #c0392b; font-family: inherit; }
.btn-danger:hover { background: #fdf0ef; }
.btn-xs { font-size: 11px; padding: 3px 8px; }

.tier-ctrl { border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; margin-bottom: 12px; background: #fafbfc; }
.tier-ctrl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
.tier-ctrl-row { display: flex; gap: 10px; margin-bottom: 10px; }
.section-ctrl { border: 1px dashed #d1d9e0; border-radius: 6px; padding: 10px; margin-bottom: 8px; background: #fff; }
.section-ctrl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 6px; }
.bullet-ctrl { display: flex; gap: 6px; margin-bottom: 4px; align-items: center; }
.bullet-ctrl .bullet-dot { color: #8093a3; font-size: 11px; }
</style>
</head>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo"><img src="https://www.expertinsights.com/wp-content/themes/developer starter theme/assets/img/new-ei-logo-white.png" alt="Expert Insights" style="height:22px;width:auto;"></div>
    <div class="topbar-title">Tools <span>/ Promo Builder</span></div>
  </div>
  <div class="topbar-right">
    <a href="index.html" class="topbar-back">← Tools Hub</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- PREVIEW -->
  <div class="preview-pane">
    <div class="preview-inner">
    <div class="preview-hint">Click any text on the graphic to edit it directly · Use controls on the right to add/remove elements</div>
    <div class="preview-wrap">
      <div class="graphic" id="graphicCanvas">
        <!-- built by JS -->
      </div>
    </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls" id="controlsPanel">
    <!-- built by JS -->
  </div>

</div>

<script>
/* ═══════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════ */
let state = {
  header: {
    headline: 'Q2 Newsletter Feature',
    subtext: 'Reach 30,000+ cybersecurity decision makers by sponsoring our InfosecVoice Newsletter.',
    urgencyText: 'OUR Q1 SLOTS SOLD OUT IN 10 DAYS — JUST 3 SPOTS REMAIN FOR Q2',
    showUrgency: true,
    gradientLeft: '#0C1222',
    gradientRight: '#1a6fb5'
  },
  tiers: [
    {
      id: 1, name: 'Top-Level Sponsorship', featured: true, featuredLabel: 'MOST POPULAR', icon: '★',
      sections: [
        { label: 'EXCLUSIVE TO THIS TIER', items: ['Top-of-newsletter placement — first thing every reader sees','Our Q1 sponsors saw an average 4.2% CTR'], highlight: true },
        { label: 'ALSO INCLUDED', items: ['Minimum 3x weekly newsletter features','CTAs to your landing page'], highlight: false }
      ],
      price: '$6,995 USD', badge: '20K impressions guaranteed'
    },
    {
      id: 2, name: 'Mid-Level Sponsorship', featured: false, featuredLabel: '', icon: '',
      sections: [
        { label: '', items: ['Mid-newsletter placement','Minimum 3x weekly newsletter features','CTAs to your landing page'], highlight: false }
      ],
      price: '$3,495 USD', badge: '20K impressions guaranteed'
    }
  ],
  addOn: {
    enabled: true, label: 'ADD-ON', title: 'Sponsored Article In The Body',
    description: 'Feature a full article placement within the newsletter body — your thought leadership content, delivered directly to 30,000+ security leaders.',
    ctaText: 'Speak to Sales'
  }
};

let nextId = 100;

/* ═══════════════════════════════════════════
   RENDER GRAPHIC (the exportable preview)
   ═══════════════════════════════════════════ */
function renderGraphic() {
  const h = state.header;
  const el = document.getElementById('graphicCanvas');

  let html = '';

  // Header
  html += `<div class="graphic-header" style="background:linear-gradient(135deg, ${h.gradientLeft}, ${h.gradientRight})">`;
  html += `<img class="graphic-logo" src="https://www.expertinsights.com/wp-content/themes/developer starter theme/assets/img/new-ei-logo-white.png" alt="Expert Insights" crossorigin="anonymous">`;
  html += `<div class="graphic-headline" contenteditable="true" data-bind="header.headline">${esc(h.headline)}</div>`;
  html += `<div class="graphic-subtext" contenteditable="true" data-bind="header.subtext">${esc(h.subtext)}</div>`;
  html += `</div>`;

  // Urgency
  if (h.showUrgency) {
    html += `<div class="graphic-urgency"><div class="graphic-urgency-text" contenteditable="true" data-bind="header.urgencyText">${esc(h.urgencyText)}</div></div>`;
  }

  // Tiers
  html += `<div class="graphic-tiers">`;
  state.tiers.forEach((tier, ti) => {
    html += `<div class="tier-card">`;
    if (tier.featured && tier.featuredLabel) {
      html += `<div class="tier-badge"><span contenteditable="true" data-bind="tiers.${ti}.featuredLabel">${esc(tier.featuredLabel)}</span></div>`;
    }
    html += `<div class="tier-inner ${tier.featured ? 'featured' : 'standard'}">`;
    html += `<div class="tier-title-row">`;
    if (tier.icon) html += `<span class="tier-icon">${esc(tier.icon)}</span>`;
    html += `<span class="tier-name" contenteditable="true" data-bind="tiers.${ti}.name">${esc(tier.name)}</span>`;
    html += `</div>`;

    tier.sections.forEach((sec, si) => {
      html += `<div class="tier-section">`;
      if (sec.label) {
        html += `<div class="tier-section-label ${sec.highlight ? 'highlight' : 'normal'}" contenteditable="true" data-bind="tiers.${ti}.sections.${si}.label">${esc(sec.label)}</div>`;
      }
      sec.items.forEach((item, ii) => {
        html += `<div class="tier-bullet"><span class="tier-bullet-dot ${sec.highlight ? 'highlight' : 'normal'}"></span><span contenteditable="true" data-bind="tiers.${ti}.sections.${si}.items.${ii}">${esc(item)}</span></div>`;
      });
      html += `</div>`;
    });

    html += `<div class="tier-footer">`;
    html += `<span class="tier-price" contenteditable="true" data-bind="tiers.${ti}.price">${esc(tier.price)}</span>`;
    if (tier.badge) {
      html += `<div class="tier-guarantee"><span contenteditable="true" data-bind="tiers.${ti}.badge">${esc(tier.badge)}</span></div>`;
    }
    html += `</div>`;
    html += `</div></div>`;
  });
  html += `</div>`;

  // Add-on
  if (state.addOn.enabled) {
    const a = state.addOn;
    html += `<div class="graphic-addon">`;
    html += `<div class="addon-label" contenteditable="true" data-bind="addOn.label">${esc(a.label)}</div>`;
    html += `<div class="addon-title" contenteditable="true" data-bind="addOn.title">${esc(a.title)}</div>`;
    html += `<div class="addon-desc" contenteditable="true" data-bind="addOn.description">${esc(a.description)}</div>`;
    html += `<div class="addon-cta" contenteditable="true" data-bind="addOn.ctaText">${esc(a.ctaText)}</div>`;
    html += `</div>`;
  }

  el.innerHTML = html;

  // Bind blur events to sync edits back to state
  el.querySelectorAll('[data-bind]').forEach(node => {
    node.addEventListener('blur', () => {
      setNestedValue(state, node.dataset.bind, node.innerText);
      renderControls(); // sync controls
    });
  });
}

/* ═══════════════════════════════════════════
   RENDER CONTROLS
   ═══════════════════════════════════════════ */
function renderControls() {
  const panel = document.getElementById('controlsPanel');
  const h = state.header;
  const a = state.addOn;

  let html = '';

  // Header
  html += `<div class="controls-header"><span class="controls-title">Controls</span><button class="btn-export" id="btnExport" onclick="doExport()">Export PNG</button></div>`;

  // Header section
  html += `<div class="ctrl-section">`;
  html += `<div class="ctrl-section-title">Header</div>`;
  html += ctrlInput('Headline', h.headline, 'header.headline');
  html += ctrlTextarea('Subtext', h.subtext, 'header.subtext');
  html += `<div class="ctrl-row"><label class="ctrl-checkbox"><input type="checkbox" ${h.showUrgency ? 'checked' : ''} onchange="updateState('header.showUrgency', this.checked)"> Show urgency banner</label></div>`;
  if (h.showUrgency) {
    html += ctrlInput('Urgency Text', h.urgencyText, 'header.urgencyText');
  }
  html += `<div class="ctrl-row"><div class="ctrl-color-row">`;
  html += `<div class="ctrl-color-group"><div class="ctrl-label">Gradient Left</div><div class="ctrl-color-inner"><input type="color" class="ctrl-color-input" value="${h.gradientLeft}" onchange="updateState('header.gradientLeft', this.value)"><input class="ctrl-input" style="flex:1" value="${esc(h.gradientLeft)}" onchange="updateState('header.gradientLeft', this.value)"></div></div>`;
  html += `<div class="ctrl-color-group"><div class="ctrl-label">Gradient Right</div><div class="ctrl-color-inner"><input type="color" class="ctrl-color-input" value="${h.gradientRight}" onchange="updateState('header.gradientRight', this.value)"><input class="ctrl-input" style="flex:1" value="${esc(h.gradientRight)}" onchange="updateState('header.gradientRight', this.value)"></div></div>`;
  html += `</div></div>`;
  html += `</div>`;

  // Tiers
  html += `<div class="ctrl-section">`;
  html += `<div class="ctrl-section-title">Tiers <button class="btn-sm" onclick="addTier()">+ Add Tier</button></div>`;

  state.tiers.forEach((tier, ti) => {
    html += `<div class="tier-ctrl">`;
    html += `<div class="tier-ctrl-header"><input class="ctrl-input" style="font-weight:700;flex:1" value="${escAttr(tier.name)}" onchange="updateState('tiers.${ti}.name', this.value)"><button class="btn-danger" onclick="removeTier(${tier.id})">✕</button></div>`;

    html += `<div class="ctrl-row" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">`;
    html += `<label class="ctrl-checkbox" style="font-size:12px"><input type="checkbox" ${tier.featured ? 'checked' : ''} onchange="updateState('tiers.${ti}.featured', this.checked)"> Featured</label>`;
    if (tier.featured) {
      html += `<input class="ctrl-input" style="width:130px;font-size:12px" value="${escAttr(tier.featuredLabel)}" placeholder="Badge text" onchange="updateState('tiers.${ti}.featuredLabel', this.value)">`;
    }
    html += `</div>`;

    html += `<div class="tier-ctrl-row"><div style="flex:1"><div class="ctrl-label">Price</div><input class="ctrl-input" value="${escAttr(tier.price)}" onchange="updateState('tiers.${ti}.price', this.value)"></div>`;
    html += `<div style="flex:1"><div class="ctrl-label">Badge</div><input class="ctrl-input" value="${escAttr(tier.badge)}" onchange="updateState('tiers.${ti}.badge', this.value)"></div></div>`;

    html += `<div class="ctrl-row"><div class="ctrl-label">Icon</div><input class="ctrl-input" style="width:60px" value="${escAttr(tier.icon)}" placeholder="e.g. ★" onchange="updateState('tiers.${ti}.icon', this.value)"></div>`;

    // Sections
    tier.sections.forEach((sec, si) => {
      html += `<div class="section-ctrl">`;
      html += `<div class="section-ctrl-header"><input class="ctrl-input" style="font-size:11px;font-weight:700;flex:1" value="${escAttr(sec.label)}" placeholder="Section label (optional)" onchange="updateSectionLabel(${ti},${si},this.value)"><button class="btn-danger btn-xs" onclick="removeSection(${ti},${si})">✕</button></div>`;
      html += `<div class="ctrl-row"><label class="ctrl-checkbox" style="font-size:11px"><input type="checkbox" ${sec.highlight ? 'checked' : ''} onchange="updateSectionHighlight(${ti},${si},this.checked)"> Highlight bullets (red)</label></div>`;

      sec.items.forEach((item, ii) => {
        html += `<div class="bullet-ctrl"><span class="bullet-dot">•</span><input class="ctrl-input" style="flex:1;font-size:12px" value="${escAttr(item)}" onchange="updateBullet(${ti},${si},${ii},this.value)"><button class="btn-danger btn-xs" onclick="removeBullet(${ti},${si},${ii})">✕</button></div>`;
      });

      html += `<button class="btn-sm" style="font-size:11px;margin-top:4px" onclick="addBullet(${ti},${si})">+ Bullet</button>`;
      html += `</div>`;
    });

    html += `<button class="btn-sm" style="font-size:11px" onclick="addSection(${ti})">+ Section</button>`;
    html += `</div>`;
  });
  html += `</div>`;

  // Add-on
  html += `<div class="ctrl-section">`;
  html += `<div class="ctrl-section-title">Add-On Section <label class="ctrl-checkbox" style="font-size:12px;font-weight:400"><input type="checkbox" ${a.enabled ? 'checked' : ''} onchange="updateState('addOn.enabled', this.checked)"> Show</label></div>`;
  if (a.enabled) {
    html += ctrlInput('Label', a.label, 'addOn.label');
    html += ctrlInput('Title', a.title, 'addOn.title');
    html += ctrlTextarea('Description', a.description, 'addOn.description');
    html += ctrlInput('CTA Text', a.ctaText, 'addOn.ctaText');
  }
  html += `</div>`;

  panel.innerHTML = html;
}

/* ═══════════════════════════════════════════
   CONTROL HELPERS
   ═══════════════════════════════════════════ */
function ctrlInput(label, value, bind) {
  return `<div class="ctrl-row"><div class="ctrl-label">${label}</div><input class="ctrl-input" value="${escAttr(value)}" onchange="updateState('${bind}', this.value)"></div>`;
}
function ctrlTextarea(label, value, bind) {
  return `<div class="ctrl-row"><div class="ctrl-label">${label}</div><textarea class="ctrl-textarea" onchange="updateState('${bind}', this.value)">${esc(value)}</textarea></div>`;
}

/* ═══════════════════════════════════════════
   STATE MUTATION
   ═══════════════════════════════════════════ */
function updateState(path, value) {
  setNestedValue(state, path, value);
  renderGraphic();
  renderControls();
}

function setNestedValue(obj, path, value) {
  const keys = path.split('.');
  let cur = obj;
  for (let i = 0; i < keys.length - 1; i++) {
    const k = isNaN(keys[i]) ? keys[i] : parseInt(keys[i]);
    cur = cur[k];
  }
  const last = isNaN(keys[keys.length-1]) ? keys[keys.length-1] : parseInt(keys[keys.length-1]);
  if (value === true || value === false) {
    cur[last] = value;
  } else {
    cur[last] = value;
  }
}

/* Tier operations */
function addTier() {
  state.tiers.push({
    id: nextId++, name: 'New Tier', featured: false, featuredLabel: '', icon: '',
    sections: [{ label: '', items: ['Feature bullet point'], highlight: false }],
    price: '$X,XXX USD', badge: ''
  });
  renderGraphic(); renderControls();
}
function removeTier(id) {
  state.tiers = state.tiers.filter(t => t.id !== id);
  renderGraphic(); renderControls();
}

/* Section operations */
function addSection(ti) {
  state.tiers[ti].sections.push({ label: 'NEW SECTION', items: ['Bullet point'], highlight: false });
  renderGraphic(); renderControls();
}
function removeSection(ti, si) {
  state.tiers[ti].sections.splice(si, 1);
  renderGraphic(); renderControls();
}
function updateSectionLabel(ti, si, val) {
  state.tiers[ti].sections[si].label = val;
  renderGraphic(); renderControls();
}
function updateSectionHighlight(ti, si, val) {
  state.tiers[ti].sections[si].highlight = val;
  renderGraphic(); renderControls();
}

/* Bullet operations */
function addBullet(ti, si) {
  state.tiers[ti].sections[si].items.push('New bullet point');
  renderGraphic(); renderControls();
}
function removeBullet(ti, si, ii) {
  state.tiers[ti].sections[si].items.splice(ii, 1);
  renderGraphic(); renderControls();
}
function updateBullet(ti, si, ii, val) {
  state.tiers[ti].sections[si].items[ii] = val;
  renderGraphic(); renderControls();
}

/* ═══════════════════════════════════════════
   EXPORT
   ═══════════════════════════════════════════ */
async function doExport() {
  const btn = document.getElementById('btnExport');
  btn.disabled = true;
  btn.textContent = 'Exporting…';

  // Temporarily hide contenteditable outlines
  const canvas = document.getElementById('graphicCanvas');
  canvas.querySelectorAll('[contenteditable]').forEach(el => {
    el.style.outline = 'none';
    el.style.boxShadow = 'none';
  });

  try {
    const c = await html2canvas(canvas, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#f5f6f8',
      logging: false
    });
    const link = document.createElement('a');
    link.download = 'promo-graphic.png';
    link.href = c.toDataURL('image/png');
    link.click();
  } catch(err) {
    console.error(err);
    alert('Export failed — check console.');
  }

  btn.disabled = false;
  btn.textContent = 'Export PNG';
}

/* ═══════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════ */
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function escAttr(str) { return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
renderGraphic();
renderControls();
</script>
