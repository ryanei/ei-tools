<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Expert Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Expert Insights — Sign In
   Centered card on a soft animated EI-blue brand wash.
   System: matches the Sales Tool Hub.
   ============================================================ */

:root {
  --ei-blue:        #012747;
  --ei-blue-700:    #0a3a64;
  --ei-blue-900:    #001a30;
  --ei-blue-50:     #eaf0f6;
  --ei-blue-100:    #d3def0;

  --paper:          #faf9f6;
  --paper-2:        #f3f1ec;
  --surface:        #ffffff;
  --line:           #e6e3dc;
  --line-2:         #efece6;

  --ink:            #131310;
  --ink-2:          #2e2d28;
  --soft:           #6a6760;
  --mute:           #9b988f;

  --green:          #2f7d4d;
  --rust:           #9b3a1f;

  --radius:         8px;
  --radius-sm:      4px;
  --radius-lg:      14px;
  --shadow-1:       0 1px 0 rgba(20,20,20,0.04), 0 1px 3px rgba(20,20,20,0.04);
  --shadow-card:    0 1px 0 rgba(20,20,20,0.04), 0 24px 60px -20px rgba(1, 39, 71, 0.18);

  --sans:           'Inter Tight', -apple-system, system-ui, sans-serif;
  --serif:          'Fraunces', 'Times New Roman', serif;
  --mono:           'JetBrains Mono', ui-monospace, monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.005em;
  overflow: hidden;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
a { color:inherit; text-decoration:none; }
input { font-family:inherit; }
img, svg { display:block; max-width:100%; }
::selection { background: var(--ei-blue-100); color: var(--ei-blue-900); }
.mono { font-family: var(--mono); }
.serif { font-family: var(--serif); }

/* ── Stage ──────────────────────────────────────────── */
.stage {
  position: relative;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px;
  overflow: hidden;
}

/* Animated brand mark backdrop */
.brand-bg {
  position: absolute; inset: 0; z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.brand-bg::before {
  /* large soft warm wash */
  content: "";
  position: absolute; inset: -10%;
  background:
    radial-gradient(60% 50% at 12% 18%, rgba(1, 39, 71, 0.06), transparent 60%),
    radial-gradient(50% 40% at 88% 82%, rgba(1, 39, 71, 0.05), transparent 60%);
}
.brand-bg svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

/* Concentric rings — slow drift */
.ring {
  fill: none;
  stroke: var(--ei-blue);
  stroke-width: 0.8;
  transform-origin: center;
  transform-box: fill-box;
  opacity: 0.08;
  animation: drift 60s ease-in-out infinite alternate;
}
.ring.r2 { opacity: 0.06; animation-duration: 75s; animation-direction: alternate-reverse; }
.ring.r3 { opacity: 0.05; animation-duration: 90s; }
.ring.r4 { opacity: 0.04; animation-duration: 110s; animation-direction: alternate-reverse; }
.ring.r5 { opacity: 0.03; animation-duration: 130s; }

@keyframes drift {
  0%   { transform: translate(0, 0) scale(1); }
  50%  { transform: translate(2%, -1%) scale(1.02); }
  100% { transform: translate(-1%, 2%) scale(0.99); }
}

/* Subtle grain layer */
.grain {
  position: absolute; inset: 0;
  opacity: 0.35;
  mix-blend-mode: multiply;
  background-image:
    radial-gradient(rgba(20,20,20,0.05) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
}

/* Floating EI mark — top left */
.brand-mark-fixed {
  position: absolute; top: 28px; left: 32px; z-index: 5;
  display: flex; align-items: center; gap: 10px;
  color: var(--ei-blue);
  font-size: 13px; font-weight: 500;
  letter-spacing: -0.005em;
}
.brand-mark-fixed svg { width: 22px; height: 22px; }
.brand-mark-fixed .name { color: var(--ink); }
.brand-mark-fixed .sep { color: var(--mute); }

/* Status pill — top right */
.status-fixed {
  position: absolute; top: 28px; right: 32px; z-index: 5;
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--soft);
  padding: 6px 12px; border-radius: 100px;
  background: var(--surface);
  border: 1px solid var(--line);
}
.status-fixed::before {
  content: ""; width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(47, 125, 77, 0.18);
}

/* ── Card ──────────────────────────────────────────── */
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 40px;
  box-shadow: var(--shadow-card);
}

.card-header {
  margin-bottom: 32px;
}
.card-eyebrow {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--soft); margin-bottom: 18px;
  text-transform: uppercase; letter-spacing: 0.16em;
  display: inline-flex; align-items: center; gap: 12px;
}
.card-eyebrow::before {
  content: ""; width: 24px; height: 1px; background: var(--ei-blue);
}
.card-title {
  font-size: 32px; font-weight: 500; line-height: 1.05;
  letter-spacing: -0.025em; color: var(--ink);
  margin-bottom: 8px;
}
.card-title .accent {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  color: var(--ei-blue);
}
.card-sub {
  font-size: 14px; color: var(--soft); line-height: 1.55;
}

/* Form */
.field { margin-bottom: 16px; }
.field-label {
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--soft); font-weight: 500;
  margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.field-label .help {
  font-family: var(--sans); text-transform: none; letter-spacing: 0;
  font-size: 12px; font-weight: 500; color: var(--ei-blue);
}
.field-label .help:hover { text-decoration: underline; }
.input-wrap {
  position: relative;
  display: flex; align-items: center;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
}
.input-wrap:hover { border-color: var(--mute); }
.input-wrap:focus-within {
  border-color: var(--ei-blue);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--ei-blue-50);
}
.input-wrap svg.lead {
  width: 16px; height: 16px;
  margin-left: 14px;
  color: var(--mute); flex-shrink: 0;
}
.input-wrap:focus-within svg.lead { color: var(--ei-blue); }
.input-wrap input {
  flex: 1;
  background: none;
  border: none; outline: none;
  padding: 12px 14px;
  font-size: 14px; color: var(--ink);
  letter-spacing: -0.005em;
}
.input-wrap input::placeholder { color: var(--mute); }
.input-wrap .reveal {
  display: grid; place-items: center;
  width: 36px; height: 36px;
  margin-right: 4px;
  border-radius: var(--radius);
  color: var(--mute);
  transition: color 180ms ease, background 180ms ease;
}
.input-wrap .reveal:hover { color: var(--ink); background: var(--paper-2); }
.input-wrap .reveal svg { width: 16px; height: 16px; }

/* Remember row */
.row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 4px; margin-bottom: 24px;
}
.checkbox {
  display: inline-flex; align-items: center; gap: 9px;
  font-size: 13px; color: var(--ink-2);
  cursor: pointer;
  user-select: none;
}
.checkbox input { display: none; }
.checkbox .box {
  width: 16px; height: 16px;
  border-radius: 4px;
  border: 1px solid var(--line);
  background: var(--surface);
  display: grid; place-items: center;
  transition: all 180ms ease;
}
.checkbox .box svg {
  width: 11px; height: 11px;
  color: #fff;
  opacity: 0;
  transition: opacity 160ms ease;
}
.checkbox input:checked + .box {
  background: var(--ei-blue);
  border-color: var(--ei-blue);
}
.checkbox input:checked + .box svg { opacity: 1; }
.checkbox:hover .box { border-color: var(--ink); }

/* Submit */
.submit {
  width: 100%;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 14px;
  background: var(--ei-blue); color: #fff;
  border-radius: var(--radius);
  font-size: 14px; font-weight: 500; letter-spacing: -0.005em;
  border: 1px solid var(--ei-blue);
  transition: background 180ms ease, transform 180ms ease;
}
.submit:hover { background: var(--ei-blue-700); }
.submit:active { transform: translateY(1px); }
.submit svg { width: 14px; height: 14px; transition: transform 200ms ease; }
.submit:hover svg { transform: translateX(2px); }

/* Footer link inside card */
.card-foot {
  margin-top: 28px; padding-top: 22px;
  border-top: 1px solid var(--line-2);
  font-size: 13px; color: var(--soft);
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.card-foot a { color: var(--ei-blue); font-weight: 500; }
.card-foot a:hover { text-decoration: underline; }

/* Bottom legal strip */
.legal {
  position: absolute; bottom: 24px; left: 0; right: 0;
  z-index: 2;
  text-align: center;
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--mute);
  display: flex; align-items: center; justify-content: center; gap: 14px;
}
.legal a { color: var(--soft); transition: color 180ms ease; }
.legal a:hover { color: var(--ei-blue); }
.legal .dot { color: var(--mute); }

/* Tiny entry animation for the card */
.card { animation: cardIn 600ms cubic-bezier(.2, .7, .2, 1) both; }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .card { padding: 32px 24px; }
  .card-title { font-size: 28px; }
  .brand-mark-fixed, .status-fixed { top: 16px; }
  .brand-mark-fixed { left: 20px; }
  .status-fixed { right: 20px; }
}
</style>
</head>
<body>

<div class="stage">

  <!-- Animated brand backdrop: large concentric rings echoing the EI mark -->
  <div class="brand-bg" aria-hidden="true">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
      <!-- Centered on roughly upper-right; rings echo EI logo (circle + handle) -->
      <g transform="translate(1080 320)">
        <circle class="ring" r="120"/>
        <circle class="ring r2" r="220"/>
        <circle class="ring r3" r="340"/>
        <circle class="ring r4" r="480"/>
        <circle class="ring r5" r="640"/>
        <!-- handle stroke echoes the magnifier of the mark -->
        <line x1="80" y1="80" x2="220" y2="220" stroke="#012747" stroke-width="1.2" stroke-linecap="round" opacity="0.08"/>
      </g>
      <!-- Secondary mark, softer, lower-left -->
      <g transform="translate(220 720)" opacity="0.6">
        <circle class="ring r3" r="180"/>
        <circle class="ring r4" r="280"/>
        <circle class="ring r5" r="380"/>
      </g>
    </svg>
    <div class="grain"></div>
  </div>

  <!-- Brand mark + status corners -->
  <div class="brand-mark-fixed" aria-label="Expert Insights">
    <svg viewBox="0 0 40 40" aria-hidden="true">
      <circle cx="20" cy="20" r="20" fill="#012747"/>
      <circle cx="17" cy="17" r="8" fill="none" stroke="#fff" stroke-width="2.4"/>
      <line x1="23" y1="23" x2="30" y2="30" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
    </svg>
    <span class="name">Expert Insights</span>
    <span class="sep">·</span>
    <span style="color: var(--soft);">Sales Tools</span>
  </div>

  <!-- Card -->
  <form class="card" id="loginForm" novalidate>
    <header class="card-header">
      <div class="card-eyebrow">Sign in</div>
      <h1 class="card-title">
        Welcome <span class="accent">back.</span>
      </h1>
      <p class="card-sub">
        Use your Expert Insights work email to access the sales toolkit.
      </p>
    </header>

    <div class="field">
      <label class="field-label" for="email">
        <span>Work email</span>
      </label>
      <div class="input-wrap">
        <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="m3 7 9 6 9-6"/>
        </svg>
        <input id="email" name="email" type="email" autocomplete="username"
               placeholder="ryan@expertinsights.com" required>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="password">
        <span>Password</span>
        <a href="#" class="help" tabindex="-1">Forgot?</a>
      </label>
      <div class="input-wrap">
        <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="11" width="16" height="10" rx="2"/>
          <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
        </svg>
        <input id="password" name="password" type="password" autocomplete="current-password"
               placeholder="••••••••••" required>
        <button type="button" class="reveal" id="reveal" title="Show password" aria-label="Show password">
          <svg id="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="row">
      <label class="checkbox">
        <input type="checkbox" id="remember" checked>
        <span class="box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m5 12 5 5L20 7"/>
          </svg>
        </span>
        <span>Remember me on this device</span>
      </label>
    </div>

    <button type="submit" class="submit">
      Sign in
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

    <div class="card-foot">
      <span>Not on the team yet?</span>
      <a href="#">Request access →</a>
    </div>
  </form>

  <div class="legal">
    <span>© 2026 Expert Insights</span>
  </div>

</div>

<script>
  // Show/hide password
  const eye = `<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeOff = `<path d="M17.94 17.94A10.06 10.06 0 0 1 12 19c-6.5 0-10-7-10-7a18.5 18.5 0 0 1 4.06-5.06"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="2" y1="2" x2="22" y2="22"/>`;
  const reveal = document.getElementById('reveal');
  const pwd = document.getElementById('password');
  const eyeSvg = document.getElementById('eye');
  reveal.addEventListener('click', () => {
    const showing = pwd.type === 'text';
    pwd.type = showing ? 'password' : 'text';
    eyeSvg.innerHTML = showing ? eye : eyeOff;
    reveal.title = showing ? 'Show password' : 'Hide password';
    reveal.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  });

  // Submit -> hub
  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('.submit');
    btn.style.opacity = '0.7';
    btn.innerHTML = 'Signing in…';
    setTimeout(() => { window.location.href = 'index.html'; }, 600);
  });
</script>
</body>
</html>
