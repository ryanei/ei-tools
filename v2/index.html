<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expert Insights — Sales Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Expert Insights — Sales Tool Hub
   System: EI Blue #012747 anchor on neutral canvas. Restrained.
   ============================================================ */

:root {
  /* Brand */
  --ei-blue:        #012747;        /* exact brand */
  --ei-blue-700:    #0a3a64;        /* hover / interactive */
  --ei-blue-900:    #001a30;        /* deepest */
  --ei-blue-50:     #eaf0f6;        /* tinted surface */
  --ei-blue-100:    #d3def0;        /* tinted border / chip bg */

  /* Neutrals — warm paper, not pure white */
  --paper:          #faf9f6;        /* canvas */
  --paper-2:        #f3f1ec;        /* sunken */
  --surface:        #ffffff;        /* card */
  --line:           #e6e3dc;        /* divider */
  --line-2:         #efece6;        /* faint divider */

  /* Ink */
  --ink:            #131310;        /* near-black, warm */
  --ink-2:          #2e2d28;
  --soft:           #6a6760;
  --mute:           #9b988f;

  /* Accents — used SPARINGLY, only for state */
  --green:          #2f7d4d;        /* live / positive */
  --green-bg:       #e8f1ea;
  --amber:          #a8741f;        /* attention / pending */
  --amber-bg:       #f4ecd9;
  --rust:           #9b3a1f;        /* down / error / Atelier red */
  --rust-bg:        #f5e4dc;

  /* System */
  --radius:         8px;
  --radius-sm:      4px;
  --radius-lg:      14px;
  --shadow-1:       0 1px 0 rgba(20,20,20,0.04), 0 1px 3px rgba(20,20,20,0.04);
  --shadow-2:       0 1px 0 rgba(20,20,20,0.05), 0 12px 40px -12px rgba(20,20,20,0.10);

  /* Type */
  --sans:           'Inter Tight', -apple-system, system-ui, sans-serif;
  --serif:          'Fraunces', 'Times New Roman', serif;
  --mono:           'JetBrains Mono', ui-monospace, monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.005em;
  overflow-x: hidden;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
a { color:inherit; text-decoration:none; }
input, textarea, select { font-family:inherit; }
img, svg { display:block; max-width:100%; }
::selection { background: var(--ei-blue-100); color: var(--ei-blue-900); }

.mono { font-family: var(--mono); font-feature-settings: "ss01" on, "tnum" on; }
.serif { font-family: var(--serif); }

/* ── Top bar ─────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  background: var(--ei-blue);
  color: #fff;
  border-bottom: 1px solid var(--ei-blue-900);
  box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px -16px rgba(1,39,71,0.5);
}
.topbar-brand { display: flex; align-items: center; gap: 14px; }
.topbar-brand .ei-mark { width: 28px; height: 28px; display: block; }
.topbar-brand .ei-mark.sm { width: 18px; height: 18px; opacity: 0.85; }
.footer .ei-mark { width: 18px; height: 18px; opacity: 0.95; }
/* Topbar mark on navy: invert to a simple white stroked glass */
.topbar .ei-mark circle:first-child { fill: rgba(255,255,255,0.12); }
.topbar .ei-mark circle:nth-child(2) { stroke: #fff; }
.topbar .ei-mark line { stroke: #fff; }
.topbar-title {
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.78);
  display: flex; align-items: center; gap: 10px;
  padding-left: 16px; margin-left: 4px;
  border-left: 1px solid rgba(255,255,255,0.18);
  height: 28px; line-height: 28px;
}
.topbar-title .crumb { color: rgba(255,255,255,0.6); }
.topbar-title .crumb.active { color: #fff; }
.topbar-title .sep { color: rgba(255,255,255,0.35); }

.topbar-nav { display: flex; align-items: center; gap: 4px; flex: 1; justify-content: center; }
.topbar-nav button {
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.65);
  padding: 6px 12px; border-radius: 100px;
  transition: color 180ms ease, background 180ms ease;
}
.topbar-nav button:hover { color: #fff; background: rgba(255,255,255,0.08); }
.topbar-nav button.active { color: var(--ei-blue); background: #fff; }

.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-env {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  color: #d4f5e1; padding: 4px 10px;
  background: rgba(255,255,255,0.08); border-radius: 100px;
  text-transform: uppercase; letter-spacing: 0.08em;
  display: inline-flex; align-items: center; gap: 6px;
}
.topbar-env::before {
  content: ""; width: 5px; height: 5px; border-radius: 50%;
  background: #4ade80; box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.25);
}
.topbar-iconbtn {
  width: 34px; height: 34px; border-radius: 100px;
  display: grid; place-items: center; color: rgba(255,255,255,0.75);
  transition: background 180ms ease, color 180ms ease;
}
.topbar-iconbtn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.topbar-iconbtn svg { width: 18px; height: 18px; }
.topbar-avatar {
  width: 32px; height: 32px; border-radius: 100px;
  background: #fff; color: var(--ei-blue);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
}

/* ── Canvas ──────────────────────────────────────────── */
.canvas { max-width: 1240px; margin: 0 auto; padding: 56px 32px 96px; }

/* ── App shell: persistent sidebar + main column ────── */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 232px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  padding: 18px 14px;
}
.sidebar-brand {
  display: flex; align-items: center; gap: 11px;
  padding: 4px 8px 18px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 14px;
}
.sidebar-brand .ei-mark { width: 30px; height: 30px; flex-shrink: 0; }
.sidebar-brand-name {
  font-family: var(--sans); font-weight: 600; font-size: 13px;
  color: var(--ink); letter-spacing: -0.01em; line-height: 1.15;
  white-space: nowrap;
}
.sidebar-brand-sub {
  font-family: var(--mono); font-size: 9.5px; color: var(--mute);
  letter-spacing: 0.16em; text-transform: uppercase;
  margin-top: 3px;
}
.sidebar-section {
  font-family: var(--mono); font-size: 9.5px;
  text-transform: uppercase; letter-spacing: 0.16em;
  color: var(--mute); padding: 10px 10px 6px; font-weight: 500;
}
.sidebar-nav { display: flex; flex-direction: column; gap: 1px; }
.sidebar-nav-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; border-radius: 6px;
  font-size: 13px; font-weight: 500; color: var(--ink-2);
  background: transparent; border: none; cursor: pointer;
  text-align: left; width: 100%;
  transition: background 150ms ease, color 150ms ease;
}
.sidebar-nav-btn:hover { background: var(--paper-2); color: var(--ink); }
.sidebar-nav-btn.active { background: var(--ei-blue-50); color: var(--ei-blue); }
.sidebar-nav-btn svg { width: 16px; height: 16px; opacity: 0.85; flex-shrink: 0; }
.sidebar-nav-btn .label { flex: 1; }
.sidebar-nav-btn .badge-mini {
  font-family: var(--mono); font-size: 9.5px; color: var(--mute);
  background: var(--paper-2); padding: 1px 7px; border-radius: 100px;
  letter-spacing: 0.02em; font-weight: 500;
}
.sidebar-nav-btn.active .badge-mini { background: rgba(255,255,255,0.7); color: var(--ei-blue); }

.sidebar-bottom { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--line); }
.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px; border-radius: 6px; cursor: pointer;
  transition: background 150ms ease;
}
.sidebar-user:hover { background: var(--paper-2); }
.sidebar-user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--ei-blue); color: white;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.sidebar-user-name { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.2; }
.sidebar-user-role { font-family: var(--mono); font-size: 9.5px; color: var(--mute); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }

.main-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* ── Slim top strip (Hub command center) ─────────────── */
.topstrip {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 40;
}
.topstrip-crumb {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--soft);
}
.topstrip-crumb .here { color: var(--ink); font-weight: 500; }
.topstrip-crumb .sep { color: var(--mute); font-size: 11px; }
.topstrip-right { display: flex; align-items: center; gap: 6px; }
.topstrip-search {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 12px; border-radius: 6px;
  background: var(--paper-2);
  border: 1px solid transparent;
  font-size: 12px; color: var(--soft);
  min-width: 280px;
}
.topstrip-search:focus-within { background: var(--surface); border-color: var(--ei-blue-100); box-shadow: 0 0 0 3px rgba(1,39,71,0.06); }
.topstrip-search svg { width: 13px; height: 13px; opacity: 0.6; }
.topstrip-search input { flex: 1; background: none; border: none; outline: none; font-size: 12px; color: var(--ink); }
.topstrip-search input::placeholder { color: var(--mute); }
.topstrip-search .kbd {
  font-family: var(--mono); font-size: 9.5px; font-weight: 500;
  padding: 1px 6px; border-radius: 3px;
  background: var(--surface); color: var(--mute);
  border: 1px solid var(--line); letter-spacing: 0.04em;
}
.topstrip-iconbtn {
  position: relative;
  width: 32px; height: 32px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--soft); border: none; background: none; cursor: pointer;
}
.topstrip-iconbtn:hover { background: var(--paper-2); color: var(--ink); }
.topstrip-iconbtn svg { width: 16px; height: 16px; }
.topstrip-iconbtn .dot-notify {
  position: absolute; top: 7px; right: 7px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ei-blue);
  box-shadow: 0 0 0 2px var(--surface);
}

/* ── Hub command center ──────────────────────────────── */
.cmd { padding: 24px 28px 48px; max-width: 1400px; margin: 0 auto; }
.cmd-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; margin-bottom: 22px;
}
.cmd-greet h1 {
  font-size: 28px; font-weight: 500; letter-spacing: -0.022em;
  color: var(--ink); line-height: 1.05;
}
.cmd-greet h1 .accent { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--ei-blue); }
.cmd-greet .sub {
  font-family: var(--mono); font-size: 10.5px; color: var(--mute);
  text-transform: uppercase; letter-spacing: 0.14em; margin-top: 8px;
  display: flex; align-items: center; gap: 10px;
}
.cmd-greet .sub .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px rgba(47,125,77,0.18); }
.cmd-period {
  display: inline-flex; gap: 2px; padding: 3px;
  border-radius: 7px;
  background: var(--paper-2); border: 1px solid var(--line);
}
.cmd-period button {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em;
  color: var(--soft); background: none; border: none; padding: 5px 11px;
  border-radius: 5px; cursor: pointer; text-transform: uppercase; font-weight: 500;
  transition: background 150ms ease, color 150ms ease;
}
.cmd-period button:hover { color: var(--ink); }
.cmd-period button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-1); }

/* KPI strip — dense, 5 cells with internal dividers */
.cmd-kpi {
  display: grid; grid-template-columns: repeat(5, 1fr);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  margin-bottom: 14px;
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.cmd-kpi-cell {
  padding: 16px 20px;
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 8px;
  min-height: 100px;
}
.cmd-kpi-cell:last-child { border-right: none; }
.cmd-kpi-cell .lbl {
  font-family: var(--mono); font-size: 9.5px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--mute);
}
.cmd-kpi-cell .val {
  font-size: 26px; font-weight: 600; color: var(--ink);
  letter-spacing: -0.026em; line-height: 1; font-variant-numeric: tabular-nums;
}
.cmd-kpi-cell .foot {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  font-family: var(--mono); font-size: 10px; color: var(--soft); margin-top: auto;
}
.cmd-kpi-cell .delta { color: var(--green); font-weight: 600; }
.cmd-kpi-cell .delta.down { color: var(--rust); }
.cmd-kpi-cell .spark { width: 56px; height: 18px; flex-shrink: 0; }

/* Card layouts */
.cmd-grid {
  display: grid; grid-template-columns: 1.75fr 1fr;
  gap: 14px; margin-bottom: 14px;
}
.cmd-grid.flip { grid-template-columns: 1fr 1.4fr; }
.cmd-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.cmd-card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--line);
}
.cmd-card-head h3 {
  font-size: 13px; font-weight: 600; color: var(--ink);
  letter-spacing: -0.005em;
}
.cmd-card-head .sub {
  font-family: var(--mono); font-size: 9.5px; color: var(--mute);
  letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px;
}
.cmd-card-head-r { display: flex; align-items: center; gap: 4px; }
.cmd-card-head-r .link {
  font-size: 12px; color: var(--soft); padding: 4px 8px; border-radius: 4px;
  cursor: pointer; background: none; border: none; font-family: inherit;
}
.cmd-card-head-r .link:hover { color: var(--ei-blue); background: var(--paper-2); }
.cmd-card-body { padding: 14px 18px 16px; flex: 1; }

/* Pipeline + forecast chart */
.fc-chart { display: flex; align-items: flex-end; gap: 18px; height: 170px; padding-top: 6px; }
.fc-bar-wrap {
  flex: 1; display: flex; flex-direction: column; gap: 8px;
  height: 100%; position: relative;
}
.fc-bar-val {
  font-family: var(--mono); font-size: 11px; color: var(--ink); font-weight: 500;
  text-align: center; font-variant-numeric: tabular-nums;
}
.fc-bar-stack {
  flex: 1; width: 100%;
  display: flex; flex-direction: column-reverse;
  border-radius: 6px; overflow: hidden;
  background: var(--paper-2);
  position: relative;
}
.fc-bar-seg {
  width: 100%; transition: opacity 150ms ease;
  cursor: default;
}
.fc-bar-seg:hover { opacity: 0.85; }
.fc-bar-seg.un { background: var(--ei-blue-100); }
.fc-bar-seg.wt { background: var(--ei-blue); }
.fc-bar-label {
  font-family: var(--mono); font-size: 9.5px; color: var(--soft);
  letter-spacing: 0.08em; text-transform: uppercase; text-align: center;
}
.fc-bar-count {
  font-family: var(--mono); font-size: 9.5px; color: var(--mute);
  letter-spacing: 0.04em; text-align: center; margin-top: 2px;
}
.fc-legend {
  display: flex; gap: 18px; padding-top: 14px;
  margin-top: 14px; border-top: 1px dashed var(--line);
  align-items: center; justify-content: space-between;
}
.fc-legend-keys { display: flex; gap: 18px; }
.fc-legend-item {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 11.5px; color: var(--soft);
}
.fc-legend-item .sq { width: 9px; height: 9px; border-radius: 2px; }
.fc-legend-totals {
  display: flex; gap: 18px;
  font-family: var(--mono); font-size: 10.5px; color: var(--mute);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.fc-legend-totals b { color: var(--ink); font-weight: 600; }

/* Renewals list */
.ren-list { display: flex; flex-direction: column; }
.ren-row {
  display: grid; grid-template-columns: 1fr auto auto;
  gap: 12px; padding: 11px 0;
  border-bottom: 1px solid var(--line-2);
  align-items: center;
}
.ren-row:first-child { padding-top: 4px; }
.ren-row:last-child { border-bottom: none; padding-bottom: 4px; }
.ren-co { display: flex; flex-direction: column; gap: 2px; }
.ren-co .nm { font-size: 13px; font-weight: 500; color: var(--ink); }
.ren-co .meta { font-family: var(--mono); font-size: 9.5px; color: var(--mute); letter-spacing: 0.08em; text-transform: uppercase; }
.ren-when {
  font-family: var(--mono); font-size: 10.5px; color: var(--soft);
  letter-spacing: 0.04em; font-weight: 500;
  white-space: nowrap;
}
.ren-when.urgent { color: var(--amber); }
.ren-when.crit { color: var(--rust); }
.ren-val { font-family: var(--mono); font-size: 12px; color: var(--ink); font-weight: 500; }

/* Proposals mini-list */
.cmd-props { display: flex; flex-direction: column; }
.cmd-prop-row {
  display: grid; grid-template-columns: 26px 1fr auto auto 80px;
  gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--line-2);
  align-items: center; cursor: pointer;
  transition: padding-left 150ms ease;
}
.cmd-prop-row:hover { padding-left: 4px; }
.cmd-prop-row:last-child { border-bottom: none; }
.cmd-prop-owner-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--ei-blue-50); color: var(--ei-blue);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 9.5px; font-weight: 500;
}
.cmd-prop-meta { min-width: 0; }
.cmd-prop-meta .nm { font-size: 13px; color: var(--ink); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cmd-prop-meta .sub { font-size: 11px; color: var(--mute); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cmd-prop-val { font-family: var(--mono); font-size: 12px; color: var(--ink); font-weight: 500; text-align: right; }
.cmd-prop-when { font-family: var(--mono); font-size: 10px; color: var(--mute); letter-spacing: 0.04em; text-align: right; }

/* Changelog */
.cl-list { display: flex; flex-direction: column; }
.cl-item {
  display: grid; grid-template-columns: 78px 1fr;
  gap: 14px; padding: 12px 0;
  border-bottom: 1px solid var(--line-2);
}
.cl-item:last-child { border-bottom: none; }
.cl-meta { display: flex; flex-direction: column; gap: 3px; }
.cl-ver {
  font-family: var(--mono); font-size: 10.5px; color: var(--ink);
  font-weight: 600; letter-spacing: 0.02em;
}
.cl-date {
  font-family: var(--mono); font-size: 9.5px; color: var(--mute);
  letter-spacing: 0.04em;
}
.cl-body { font-size: 13px; color: var(--ink-2); line-height: 1.5; }
.cl-body b { color: var(--ink); font-weight: 600; }
.cl-tag {
  display: inline-block; font-family: var(--mono); font-size: 9.5px; font-weight: 600;
  padding: 1px 7px; border-radius: 3px; letter-spacing: 0.06em;
  background: var(--ei-blue-50); color: var(--ei-blue);
  margin-right: 8px; vertical-align: 1px; text-transform: uppercase;
}
.cl-tag.fix { background: var(--green-bg); color: var(--green); }
.cl-tag.note { background: var(--amber-bg); color: var(--amber); }

@media (max-width: 1200px) {
  .cmd-kpi { grid-template-columns: repeat(3, 1fr); }
  .cmd-kpi-cell { border-bottom: 1px solid var(--line); }
  .cmd-kpi-cell:nth-child(3n) { border-right: none; }
  .cmd-kpi-cell:nth-last-child(-n+2) { border-bottom: none; }
  .cmd-grid, .cmd-grid.flip { grid-template-columns: 1fr; }
}
@media (max-width: 800px) {
  .sidebar { display: none; }
}

/* ── Hero ────────────────────────────────────────────── */
.hero { margin-bottom: 56px; }
.hero-eyebrow {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--soft); margin-bottom: 20px;
  text-transform: uppercase; letter-spacing: 0.16em;
  display: inline-flex; align-items: center; gap: 12px;
}
.hero-eyebrow::before {
  content: ""; width: 24px; height: 1px; background: var(--ei-blue);
}
.hero-title {
  font-size: clamp(44px, 5.5vw, 64px);
  font-weight: 500; line-height: 0.98; letter-spacing: -0.025em;
  color: var(--ink);
  max-width: 880px;
}
.hero-title .accent {
  font-family: var(--serif); font-style: italic; font-weight: 400;
  color: var(--ei-blue);
  letter-spacing: -0.02em;
}
.hero-sub {
  margin-top: 22px;
  font-size: 17px; color: var(--soft); line-height: 1.55;
  max-width: 560px;
}
.hero-meta {
  margin-top: 32px;
  display: flex; gap: 32px; flex-wrap: wrap;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}
.hero-meta-item .lbl {
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--mute); margin-bottom: 6px;
}
.hero-meta-item .val {
  font-size: 14px; font-weight: 500; color: var(--ink);
}
.hero-meta-item .val .b { color: var(--ei-blue); font-weight: 600; }

/* ── Section label ───────────────────────────────────── */
.section-label {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.16em;
  color: var(--soft); font-weight: 500;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.section-label::after {
  content: ""; flex: 1; height: 1px; background: var(--line);
}
.section-label .num {
  font-family: var(--mono); font-size: 11px; color: var(--mute);
  letter-spacing: 0.04em;
}

/* ── Announcement strip ──────────────────────────────── */
.announcement {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 32px;
  box-shadow: var(--shadow-1);
}
.announcement-tag {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--ei-blue);
  padding: 3px 9px; border-radius: var(--radius-sm);
  background: var(--ei-blue-50);
  flex-shrink: 0;
}
.announcement-text { font-size: 14px; color: var(--ink-2); flex: 1; line-height: 1.5; }
.announcement-text b { font-weight: 600; color: var(--ink); }
.announcement-time {
  font-family: var(--mono); font-size: 11px; color: var(--mute); flex-shrink: 0;
}
.announcement-x {
  width: 22px; height: 22px; border-radius: 100px;
  display: grid; place-items: center;
  color: var(--mute); transition: color 180ms ease, background 180ms ease;
}
.announcement-x:hover { color: var(--ink); background: var(--paper-2); }

/* ── Tools grid ──────────────────────────────────────── */
.tools-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
}
.tool-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 26px 26px 22px;
  display: flex; flex-direction: column; gap: 18px;
  min-height: 220px;
  text-align: left;
  transition: border-color 200ms ease, transform 220ms ease, box-shadow 220ms ease;
  cursor: pointer;
  box-shadow: var(--shadow-1);
}
.tool-card:hover {
  border-color: var(--ei-blue-100);
  transform: translateY(-2px);
  box-shadow: var(--shadow-2);
}
.tool-card-head {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
}
.tool-card-icon {
  width: 40px; height: 40px; border-radius: var(--radius);
  display: grid; place-items: center;
  background: var(--ei-blue-50); color: var(--ei-blue);
}
.tool-card-icon svg { width: 20px; height: 20px; }
.tool-card-num {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.1em; color: var(--mute);
}
.tool-card-body { flex: 1; }
.tool-card-title {
  font-size: 20px; font-weight: 600; letter-spacing: -0.018em;
  color: var(--ink); margin-bottom: 6px;
  line-height: 1.2;
}
.tool-card-desc {
  font-size: 14px; color: var(--soft); line-height: 1.5;
}
.tool-card-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 16px; border-top: 1px solid var(--line-2);
}
.tool-card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tool-card-tag {
  font-size: 11px; font-weight: 500; color: var(--soft);
  padding: 3px 8px; border-radius: var(--radius-sm);
  background: var(--paper-2);
}
.tool-card-arrow {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 500; color: var(--ei-blue);
  transition: gap 200ms ease;
}
.tool-card-arrow svg { width: 14px; height: 14px; }
.tool-card:hover .tool-card-arrow { gap: 10px; }
.tool-card-status {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.1em;
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--green);
}
.tool-card-status::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 0 3px rgba(47, 125, 77, 0.18);
}

/* ── Activity card ───────────────────────────────────── */
.activity {
  margin-top: 56px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-1);
}
.activity-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 26px;
  border-bottom: 1px solid var(--line);
}
.activity-head h3 {
  font-size: 16px; font-weight: 600; letter-spacing: -0.012em;
}
.activity-head-actions { display: flex; align-items: center; gap: 14px; }
.activity-head-actions .link {
  font-size: 13px; font-weight: 500; color: var(--ei-blue);
}
.activity-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
}
.activity-stat {
  padding: 22px 26px;
  border-right: 1px solid var(--line);
}
.activity-stat:last-child { border-right: none; }
.activity-stat-label {
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--mute); margin-bottom: 8px;
}
.activity-stat-value {
  font-size: 28px; font-weight: 500; letter-spacing: -0.025em; line-height: 1;
  display: flex; align-items: baseline; gap: 8px;
  color: var(--ink);
}
.activity-stat-delta {
  font-family: var(--mono); font-size: 11px;
  color: var(--green);
}
.activity-stat-delta.down { color: var(--rust); }

.activity-rows {
  border-top: 1px solid var(--line);
}
.activity-row {
  display: grid;
  grid-template-columns: 28px 1fr 1.2fr 110px 100px;
  gap: 16px; padding: 12px 26px;
  border-bottom: 1px solid var(--line-2);
  align-items: center;
  font-size: 13px;
}
.activity-row:last-child { border-bottom: none; }
.activity-row .avatar {
  width: 24px; height: 24px; border-radius: 100px;
  background: var(--ei-blue-50); color: var(--ei-blue);
  font-size: 10px; font-weight: 600;
  display: grid; place-items: center;
}
.activity-row .who { font-weight: 500; }
.activity-row .what { color: var(--soft); }
.activity-row .what b { color: var(--ink); font-weight: 500; }
.activity-row .tool {
  font-family: var(--mono); font-size: 10px; color: var(--mute);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.activity-row .when {
  font-family: var(--mono); font-size: 11px; color: var(--mute); text-align: right;
}

/* ── Footer ──────────────────────────────────────────── */
.footer {
  margin-top: 64px; padding-top: 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--line);
  font-size: 12px; color: var(--mute);
}
.footer .left { display: flex; align-items: center; gap: 14px; }

/* ── Sub-screens ─────────────────────────────────────── */
.screen-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding-bottom: 32px; margin-bottom: 32px;
  border-bottom: 1px solid var(--line);
}
.screen-eyebrow {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.16em;
  color: var(--soft); margin-bottom: 14px;
  display: flex; align-items: center; gap: 14px;
}
.screen-eyebrow .back {
  display: inline-flex; align-items: center; gap: 6px;
  cursor: pointer; color: var(--soft);
  transition: color 180ms ease;
}
.screen-eyebrow .back:hover { color: var(--ei-blue); }
.screen-eyebrow .back svg { width: 12px; height: 12px; }
.screen-eyebrow .sep { color: var(--mute); }
.screen-title {
  font-size: 40px; font-weight: 500; letter-spacing: -0.028em; line-height: 1;
  color: var(--ink);
}
.screen-sub { margin-top: 12px; color: var(--soft); font-size: 15px; max-width: 540px; line-height: 1.5; }

.screen-actions { display: flex; align-items: center; gap: 10px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink);
  transition: all 180ms ease;
}
.btn:hover { border-color: var(--ink); }
.btn svg { width: 14px; height: 14px; }
.btn.primary {
  background: var(--ei-blue); color: white; border-color: var(--ei-blue);
}
.btn.primary:hover { background: var(--ei-blue-700); border-color: var(--ei-blue-700); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--soft); }
.btn.ghost:hover { color: var(--ink); background: var(--paper-2); }

/* KPIs */
.kpi-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  margin-bottom: 24px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow-1);
}
.kpi-label {
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--mute); margin-bottom: 10px;
}
.kpi-value {
  font-size: 30px; font-weight: 500; letter-spacing: -0.028em; line-height: 1;
  display: flex; align-items: baseline; gap: 8px;
}
.kpi-delta { font-family: var(--mono); font-size: 11px; color: var(--green); }
.kpi-delta.down { color: var(--rust); }

/* Data card / tables */
.data-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-1);
}
.data-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--line);
}
.data-head h3 { font-size: 15px; font-weight: 600; letter-spacing: -0.012em; }
.data-controls { display: flex; align-items: center; gap: 10px; }
.data-search {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: var(--radius);
  background: var(--paper-2);
  border: 1px solid var(--line);
}
.data-search svg { width: 13px; height: 13px; opacity: 0.5; }
.data-search input {
  background: none; border: none; outline: none;
  font-size: 12px; width: 180px; color: var(--ink);
}
.data-search input::placeholder { color: var(--mute); }

.data-table { font-size: 13px; }
.data-row {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 16px; padding: 12px 24px;
  border-bottom: 1px solid var(--line-2);
  align-items: center;
}
.data-row:last-child { border-bottom: none; }
.data-row.head {
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--mute); border-bottom: 1px solid var(--line);
  padding: 12px 24px; font-weight: 500;
}
.data-row .pri { font-weight: 500; color: var(--ink); }
.data-row .sec { color: var(--soft); }

/* Badges */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
  padding: 3px 9px; border-radius: var(--radius-sm);
}
.badge::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.badge.active   { color: var(--green); background: var(--green-bg); }
.badge.pending  { color: var(--amber); background: var(--amber-bg); }
.badge.renewal  { color: var(--ei-blue); background: var(--ei-blue-50); }
.badge.sent     { color: var(--ei-blue); background: var(--ei-blue-50); }
.badge.drafting { color: var(--amber); background: var(--amber-bg); }
.badge.awaiting { color: var(--ei-blue); background: var(--ei-blue-50); }
.badge.closed   { color: var(--soft); background: var(--paper-2); }

/* ── Proposals screen ──────────────────────────────── */
.kpi .kpi-foot {
  font-family: var(--mono); font-size: 10px; color: var(--mute);
  margin-top: 12px; letter-spacing: 0.04em;
}
.prop-kpi-grid { margin-bottom: 32px; }

.section-eyebrow {
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.16em; color: var(--mute); margin-bottom: 8px;
}

.prop-split {
  display: grid; grid-template-columns: 1.45fr 1fr; gap: 16px;
  margin-bottom: 32px;
}
.prop-queue-card, .prop-tmpl-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 22px 24px 20px;
  box-shadow: var(--shadow-1);
}
.prop-queue-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding-bottom: 16px; margin-bottom: 4px;
  border-bottom: 1px solid var(--line);
}
.prop-queue-title {
  font-size: 17px; font-weight: 500; letter-spacing: -0.01em; color: var(--ink);
}
.prop-queue-count {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--ei-blue); background: var(--ei-blue-50);
  padding: 4px 10px; border-radius: 100px; letter-spacing: 0.04em;
}
.prop-link {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
  color: var(--soft); text-decoration: none; padding-top: 6px;
}
.prop-link:hover { color: var(--ei-blue); }

.prop-queue-list { list-style: none; margin: 0; padding: 0; }
.prop-queue-item {
  display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center;
  padding: 14px 0; border-bottom: 1px solid var(--line);
}
.prop-queue-item:last-child { border-bottom: none; padding-bottom: 0; }
.prop-queue-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  background: var(--paper-2); color: var(--soft);
  flex-shrink: 0;
}
.prop-queue-icon svg { width: 16px; height: 16px; }
.prop-queue-item.kind-signature .prop-queue-icon { background: var(--ei-blue-50); color: var(--ei-blue); }
.prop-queue-item.kind-expiring  .prop-queue-icon { background: var(--amber-bg); color: var(--amber); }
.prop-queue-item.kind-draft     .prop-queue-icon { background: var(--paper-2); color: var(--soft); }
.prop-queue-item.kind-approval  .prop-queue-icon { background: var(--green-bg); color: var(--green); }

.prop-queue-row1 {
  display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
  margin-bottom: 4px;
}
.prop-queue-name { font-size: 13.5px; font-weight: 500; color: var(--ink); }
.prop-queue-val  { font-size: 12px; color: var(--soft); font-weight: 500; }
.prop-queue-meta {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 10.5px;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--mute);
}
.prop-queue-meta .dot { color: var(--line); }
.prop-kind-tag {
  display: inline-flex; padding: 2px 7px; border-radius: 3px;
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em;
}
.prop-kind-tag.kind-signature { color: var(--ei-blue); background: var(--ei-blue-50); }
.prop-kind-tag.kind-expiring  { color: var(--amber);   background: var(--amber-bg);   }
.prop-kind-tag.kind-draft     { color: var(--soft);    background: var(--paper-2);    }
.prop-kind-tag.kind-approval  { color: var(--green);   background: var(--green-bg);   }
.prop-queue-cta { font-size: 12px; padding: 6px 12px; }

.prop-tmpl-list { list-style: none; margin: 0; padding: 0; }
.prop-tmpl-item {
  padding: 14px 0; border-bottom: 1px solid var(--line); cursor: pointer;
  transition: padding-left 180ms ease;
}
.prop-tmpl-item:last-child { border-bottom: none; padding-bottom: 0; }
.prop-tmpl-item:hover { padding-left: 4px; }
.prop-tmpl-row {
  display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
  margin-bottom: 3px;
}
.prop-tmpl-name { font-size: 13.5px; font-weight: 500; color: var(--ink); }
.prop-tmpl-uses { font-size: 11px; color: var(--mute); letter-spacing: 0.04em; }
.prop-tmpl-desc { font-size: 12.5px; color: var(--soft); line-height: 1.45; }

/* Proposals table */
.prop-table-card .data-head {
  flex-wrap: wrap; gap: 16px;
}
.prop-tabs { display: flex; align-items: center; gap: 2px; }
.prop-tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: var(--radius-sm);
  font-size: 12.5px; font-weight: 500;
  background: transparent; border: none; color: var(--soft);
  cursor: pointer; transition: all 150ms ease;
}
.prop-tab:hover { color: var(--ink); background: var(--paper-2); }
.prop-tab.active { color: var(--ei-blue); background: var(--ei-blue-50); }
.prop-tab-count {
  font-family: var(--mono); font-size: 10px; color: var(--mute);
  background: var(--paper-2); padding: 1px 6px; border-radius: 3px;
  letter-spacing: 0.02em;
}
.prop-tab.active .prop-tab-count { background: rgba(255,255,255,0.6); color: var(--ei-blue); }

.prop-row {
  grid-template-columns: 2.4fr 1.2fr 1fr 0.8fr 1fr 0.7fr 36px !important;
  align-items: center;
}
.prop-row .num { text-align: right; }
.prop-row.head .num { text-align: right; }
.prop-cell-client { display: flex; align-items: center; gap: 12px; }
.prop-mono-mark {
  width: 30px; height: 30px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10.5px; font-weight: 500;
  background: var(--paper-2); color: var(--soft);
  letter-spacing: 0.04em; flex-shrink: 0;
}
.prop-campaign {
  font-size: 11.5px; color: var(--mute); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.prop-stage { font-size: 12px; }
.prop-owner { display: inline-flex; align-items: center; gap: 8px; }
.prop-owner-init {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 9.5px; font-weight: 500;
  background: var(--ei-blue-50); color: var(--ei-blue);
  letter-spacing: 0.02em;
}
.prop-updated { font-size: 11px; }
.prop-flag {
  display: inline-block; margin-left: 6px; font-size: 9px;
  vertical-align: middle;
}
.prop-flag.stalled  { color: var(--amber); }
.prop-flag.expiring { color: #c2410c; }
.prop-row-actions { display: flex; justify-content: flex-end; }
.prop-row-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid transparent; background: transparent;
  color: var(--mute); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 150ms ease;
}
.prop-row-btn:hover { color: var(--ei-blue); border-color: var(--line); background: var(--paper-2); }
.prop-row-btn svg { width: 13px; height: 13px; }
.prop-empty {
  padding: 48px 0; text-align: center; color: var(--mute);
  font-size: 13px;
}

@media (max-width: 960px) {
  .prop-split { grid-template-columns: 1fr; }
}

/* Pipeline columns */
.pipeline {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
}
.pl-col {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 16px;
  min-height: 480px;
  display: flex; flex-direction: column; gap: 10px;
}
.pl-col-head {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 12px; border-bottom: 1px solid var(--line);
  margin-bottom: 4px;
}
.pl-col-head .name {
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--ink); font-weight: 500;
}
.pl-col-head .count {
  font-family: var(--mono); font-size: 11px; color: var(--mute);
  background: var(--paper-2); padding: 2px 8px; border-radius: 100px;
}
.pl-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: grab;
  transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
}
.pl-card:hover {

.chart-legend-item {

.chart-legend-item::before {

.chart-legend-item.b::before { background: var(--ei-blue-100); }

.list-card {
  background: var(--surface);

.list-row {

.list-row .nm { font-weight: 500; }
.list-row .v {
  font-family: var(--mono); font-size: 12px; color: var(--ink);

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

    { ver: "v1.8.5", date: "Apr 11", tag: "note",   body: <><b>Pipeline forecast</b> now uses stage probabilities from <span className="mono">Sheet2</span>. Talk to Ryan to change them.</> },
    { ver: "v1.8.0", date: "Apr 02", tag: "update", body: <><b>Accounts</b> can now be filtered by renewal window.</> },
  ];

  /* Sparkline renderer */
  const Spark = ({ data, color = "var(--ei-blue)" }) => {
    const w = 56, h = 18, p = 2;
    const max = Math.max(...data), min = Math.min(...data);
    const range = max - min || 1;
    const stepX = (w - p*2) / (data.length - 1);
    const points = data.map((v,i) => `${p + i*stepX},${h - p - ((v-min)/range)*(h - p*2)}`).join(" ");
    return (
      <svg className="spark" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
        <polyline points={points} fill="none" stroke={color} strokeWidth="1.4" strokeLinejoin="round" strokeLinecap="round"/>
      </svg>
    );
  };

  return (

              <span className={"delta " + (k.dir === "down" ? "down" : "")}>{k.delta}</span>

      {/* Row 1: pipeline + renewals */}
      <div className="cmd-grid">

          <div className="cmd-card-body">

                      <div className="fc-bar-seg un" style={{height: `${unH - wtH}%`}} title={`Unweighted: $${f.un}K`}/>
                      <div className="fc-bar-seg wt" style={{height: `${wtH}%`}} title={`Weighted: $${f.wt}K`}/>

            }}/>
            <div style={{
              width: '60%',
              height: `${(d.a/max)*100}%`,
              background: 'var(--ei-blue)',
              borderRadius: '3px 3px 0 0',
              position: 'absolute', bottom: 0, left: '20%',
            }}/>
          </div>
          <div className="mono" style={{fontSize: 10, color: 'var(--mute)', letterSpacing: '0.06em'}}>{d.w}</div>
        </div>
      ))}
    </div>
  );
}

/* ───────── Accounts ───────── */
function Accounts({ onNav }) {
  return (
    <main className="canvas">
      <ScreenHeader
        title="Accounts"
        sub="Advertiser & campaign database. Track contracts, campaigns, and account health."
        onNav={onNav}
        actions={
          <>
            <button className="btn">Import CSV</button>
            <button className="btn primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
              New account
            </button>
          </>
        }
      />

      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-label">Active accounts</div><div className="kpi-value">128<span className="kpi-delta">+6</span></div></div>
        <div className="kpi"><div className="kpi-label">YTD spend</div><div className="kpi-value">$8.4M<span className="kpi-delta">+22%</span></div></div>
        <div className="kpi"><div className="kpi-label">Up for renewal</div><div className="kpi-value">14<span className="kpi-delta">+2</span></div></div>
        <div className="kpi"><div className="kpi-label">Avg. contract</div><div className="kpi-value">$420K<span className="kpi-delta">+8%</span></div></div>
      </div>

      <div className="data-card">
        <div className="data-head">
          <h3>All accounts</h3>
          <div className="data-controls">
            <div className="data-search">
              {window.ICONS.search}
              <input placeholder="Search accounts…"/>
            </div>
            <button className="btn ghost">Filter</button>
            <button className="btn ghost">Group by industry</button>
          </div>
        </div>
        <div className="data-table">
          <div className="data-row head">
            <div>Account</div>
            <div>Industry</div>
            <div>Status</div>
            <div>YTD Spend</div>
            <div>Campaigns</div>
          </div>
          {M.ACCOUNTS_DATA.map((a, i) => (
            <div key={i} className="data-row">
              <div className="pri">{a.name}</div>
              <div className="sec">{a.industry}</div>
              <div><span className={"badge " + a.status.toLowerCase()}>{a.status}</span></div>
              <div className="mono pri">{a.spend}</div>
              <div className="sec">{a.campaigns} live</div>
            </div>
          ))}
        </div>
      </div>
    </main>
  );
}

/* ───────── Pipeline ───────── */
function Pipeline({ onNav }) {
  const byStage = M.STAGES.map((stage) => ({
    stage,
    deals: M.DEALS.filter((d) => d.stage === stage),
  }));
  return (
    <main className="canvas">
      <ScreenHeader
        title="Sales Pipeline"
        sub="Track deals across stages, forecast revenue, monitor win rates."
        onNav={onNav}
        actions={
          <>
            <button className="btn">Forecast</button>
            <button className="btn primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
              New deal
            </button>
          </>
        }
      />

      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-label">Pipeline value</div><div className="kpi-value">$2.4M<span className="kpi-delta">+12%</span></div></div>
        <div className="kpi"><div className="kpi-label">Weighted forecast</div><div className="kpi-value">$1.1M<span className="kpi-delta">+8%</span></div></div>
        <div className="kpi"><div className="kpi-label">Win rate</div><div className="kpi-value">34%<span className="kpi-delta">+3pp</span></div></div>
        <div className="kpi"><div className="kpi-label">Avg. cycle</div><div className="kpi-value">21d<span className="kpi-delta">-2d</span></div></div>
      </div>

      <div className="pipeline">
        {byStage.map((col) => (
          <div key={col.stage} className="pl-col">
            <div className="pl-col-head">
              <span className="name">{col.stage}</span>
              <span className="count mono">{col.deals.length}</span>
            </div>
            {col.deals.map((d, i) => (
              <div key={i} className="pl-card">
                <div className="co">{d.co}</div>
                <div className="val mono">{d.value}</div>
                <div className="meta">
                  <span>{d.owner}</span>
                  <span className="prob">{d.prob}% · likely</span>
                </div>
              </div>
            ))}
            {col.deals.length === 0 && (
              <div style={{
                padding: '20px 12px', textAlign: 'center',
                color: 'var(--mute)', fontSize: 12,
                border: '1px dashed var(--line)', borderRadius: 'var(--radius)'
              }}>No deals yet</div>
            )}
          </div>
        ))}
      </div>
    </main>
  );
}

/* ───────── Tweaks ───────── */
function TweaksUI({ tweaks, setTweak, screen, onNav }) {
  return (
    <window.TweaksPanel title="Tweaks">
      <window.TweakSection title="Screen">
        <window.TweakSelect
          value={screen}
          options={[
            { value: "hub",        label: "Hub (primary)" },
            { value: "proposals",  label: "Proposal Manager" },
            { value: "dashboard",  label: "Audience Dashboard" },
            { value: "accounts",   label: "Accounts" },
            { value: "pipeline",   label: "Sales Pipeline" },
          ]}
          onChange={(v) => onNav(v)}
        />
      </window.TweakSection>
      <window.TweakSection title="Hub options">
        <window.TweakToggle
          label="Show announcement"
          value={tweaks.showAnnouncement}
          onChange={(v) => setTweak({ showAnnouncement: v })}
        />
      </window.TweakSection>
    </window.TweaksPanel>
  );
}

/* ───────── App ───────── */
function App() {
  const defaults = /*EDITMODE-BEGIN*/{
    "screen": "hub",
    "showAnnouncement": true
  }/*EDITMODE-END*/;
  const [tweaks, setTweaks] = useTweaks(defaults);
  const [screen, setScreen] = useState(defaults.screen || "hub");

  const handleNav = (id) => {
    setScreen(id);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const screens = {
    hub:        <Hub tweaks={tweaks} onNav={handleNav} />,
    proposals:  <Proposals tweaks={tweaks} onNav={handleNav} />,
    dashboard:  <Dashboard tweaks={tweaks} onNav={handleNav} />,
    accounts:   <Accounts tweaks={tweaks} onNav={handleNav} />,
    pipeline:   <Pipeline tweaks={tweaks} onNav={handleNav} />,
  };

  return (
    <div className="app">
      <Sidebar screen={screen} onNav={handleNav} />
      <div className="main-col">
        <TopStrip screen={screen} onNav={handleNav} />
        {screens[screen]}
      </div>
      <TweaksUI tweaks={tweaks} setTweak={setTweaks} screen={screen} onNav={handleNav} />
    </div>
  );
}

setTimeout(() => {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
}, 0);

</script>
</body>
</html>
