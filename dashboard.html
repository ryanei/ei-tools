<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audience Insights | Audience Composition</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --dark-900: #001323; --white: #FFFFFF; --red-900: #BF0A61; --red-800: #C3176A;
    --bright-blue-900: #006BC1; --bright-blue-800: #1174C5; --bright-blue-100: #E5F0F9;
    --dark-blue: #012747; --dark-blue-500: #8093A3; --grey-900: #4F606E;
    --grey-500: #585C66; --light-grey: #E7E7E7; --positive-900: #29A642;
    --critical-900: #E0B51A; --negative-900: #A60E0D; --bg: #F4F6F8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'IBM Plex Sans',sans-serif; background:#F4F6F8; color:#001323; font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }

  .header { background:#001323; padding:24px 48px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
  .header-left { display:flex; align-items:center; gap:16px; }
  .header-logo { display:none; }
  .header h1 { font-size:20px; font-weight:700; color:#FFFFFF; letter-spacing:-0.02em; }
  .header h1 span { color:#8093A3; font-weight:400; font-size:18px; }
  .header-right { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .tag { background:#012747; color:#E5F0F9; padding:4px 12px; border-radius:4px; font-size:11px; font-weight:500; }
  .header-time { color:#8093A3; font-size:12px; }

  .advertiser-banner { background:#E5F0F9; padding:16px 48px; display:none; align-items:center; gap:12px; border-bottom:1px solid #C8DFF0; }
  .advertiser-banner.active { display:flex; }
  .advertiser-banner-label { font-size:12px; font-weight:600; color:#006BC1; text-transform:uppercase; letter-spacing:0.06em; }
  .advertiser-banner-name { font-size:22px; font-weight:700; color:#001323; letter-spacing:-0.02em; }

  .filters-bar { background:#FFFFFF; border-bottom:1px solid #E7E7E7; padding:14px 48px; display:flex; gap:24px; align-items:center; font-size:12px; color:#4F606E; flex-wrap:wrap; }
  .filter-label { font-weight:600; color:#012747; }
  .btn { padding:6px 16px; background:#E5F0F9; color:#006BC1; border:1px solid rgba(0,107,193,0.12); border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .btn:hover { background:#006BC1; color:#FFFFFF; }
  .btn-pdf { background:#012747; color:#FFFFFF; border-color:#012747; }
  .btn-pdf:hover { background:#001323; }
  .advertiser-select { padding:6px 12px; border:1px solid #E7E7E7; border-radius:6px; font-size:12px; font-family:inherit; color:#001323; background:#FFFFFF; cursor:pointer; min-width:180px; }
  .advertiser-select:focus { outline:none; border-color:#006BC1; box-shadow:0 0 0 2px rgba(0,107,193,0.15); }

  .main { padding:32px 48px; max-width:1440px; margin:0 auto; }

  .loading-screen, .error-screen { min-height:60vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; padding:40px; }
  .spinner { width:48px; height:48px; border:3px solid #E7E7E7; border-top-color:#006BC1; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation:fadeInUp 0.5s ease forwards; }

  .kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:32px; }
  .kpi-card { background:#FFFFFF; border-radius:12px; padding:28px 32px; border:1px solid #E7E7E7; position:relative; overflow:hidden; }
  .kpi-card .accent { position:absolute; top:0; left:0; right:0; height:3px; }
  .kpi-label { font-size:12px; font-weight:600; color:#4F606E; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
  .kpi-value { font-size:40px; font-weight:700; color:#001323; letter-spacing:-0.03em; line-height:1.1; }

  .section { background:#FFFFFF; border-radius:12px; border:1px solid #E7E7E7; padding:28px 32px; margin-bottom:24px; }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid #EEF1F4; }
  .section-title { font-size:18px; font-weight:700; color:#001323; }
  .section-subtitle { font-size:12px; color:#8093A3; margin-top:2px; }

  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; }

  .hbar-list { display:flex; flex-direction:column; gap:10px; }
  .hbar-row { display:flex; align-items:center; gap:10px; }
  .hbar-label { width:170px; font-size:12px; color:#001323; flex-shrink:0; line-height:1.3; }
  .hbar-bar-wrap { flex:1; display:flex; align-items:center; gap:8px; }
  .hbar-bar { height:22px; border-radius:4px; min-width:4px; transition:width 0.6s ease; }
  .hbar-value { font-size:12px; font-weight:600; color:#4F606E; white-space:nowrap; }

  .treemap { display:flex; flex-wrap:wrap; gap:4px; }
  .treemap-tile { border-radius:6px; padding:8px 10px; display:flex; flex-direction:column; justify-content:center; min-height:48px; box-sizing:border-box; transition:opacity 0.2s; cursor:default; }
  .treemap-tile:hover { opacity:0.88; }
  .treemap-tile-pct { font-size:16px; font-weight:700; color:#FFFFFF; line-height:1.2; }
  .treemap-tile-label { font-size:10px; color:rgba(255,255,255,0.85); line-height:1.2; margin-top:2px; overflow:hidden; text-overflow:ellipsis; }

  .line-chart-wrap { position:relative; }
  .line-chart-svg { width:100%; display:block; }
  .chart-legend { display:flex; gap:20px; justify-content:center; margin-top:16px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:#4F606E; }
  .legend-dot { width:10px; height:10px; border-radius:3px; }

  .seniority-card { display:flex; align-items:center; gap:16px; padding:16px; border-radius:8px; margin-bottom:14px; }
  .seniority-pct { font-size:30px; font-weight:700; min-width:60px; }
  .seniority-name { font-size:14px; font-weight:600; color:#001323; }

  .stacked-bar-wrap { margin-bottom:24px; }
  .stacked-bar { display:flex; height:36px; border-radius:6px; overflow:hidden; gap:2px; }
  .stacked-seg { display:flex; align-items:center; justify-content:center; color:#FFFFFF; font-size:12px; font-weight:600; }
  .stacked-legend { display:flex; gap:20px; margin-top:10px; flex-wrap:wrap; }
  .stacked-legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:#4F606E; }
  .stacked-legend-dot { width:10px; height:10px; border-radius:3px; }

  .profile-cols { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .profile-col-title { font-size:12px; font-weight:600; color:#8093A3; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:12px; }
  .compact-list { display:flex; flex-direction:column; gap:2px; }
  .compact-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid #F2F4F6; }
  .compact-row:last-child { border-bottom:none; }
  .compact-label { font-size:13px; color:#001323; }
  .compact-val { font-size:13px; font-weight:700; color:#006BC1; }

  .region-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }
  .region-card { background:#E5F0F9; border-radius:8px; padding:16px 20px; text-align:center; }
  .region-card-name { font-size:12px; font-weight:600; color:#012747; margin-bottom:4px; }
  .region-card-val { font-size:24px; font-weight:700; color:#001323; letter-spacing:-0.02em; }

  .ranked-list { display:flex; flex-direction:column; gap:6px; }
  .ranked-item { display:flex; align-items:center; gap:12px; padding:8px 12px; border-radius:6px; }
  .ranked-item:hover { background:#FAFBFC; }
  .rank-badge { width:24px; height:24px; border-radius:50%; background:#E5F0F9; color:#012747; font-size:11px; font-weight:600; display:flex; align-items:center; justify-content:center; }
  .ranked-name { flex:1; font-size:13px; }
  .ranked-val { font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; }

  .data-table { width:100%; border-collapse:collapse; }
  .data-table th { text-align:left; font-size:11px; font-weight:600; color:#8093A3; text-transform:uppercase; letter-spacing:0.05em; padding:8px 10px; border-bottom:2px solid #E7E7E7; }
  .data-table td { padding:8px 10px; font-size:12px; border-bottom:1px solid #F2F4F6; max-width:400px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .data-table tr:hover td { background:#FAFBFC; }
  .data-table .num { text-align:right; font-weight:600; font-variant-numeric:tabular-nums; }
  .data-table th.num { text-align:right; }
  .data-table .link-col { color:#006BC1; font-weight:500; }
  .data-table .pages-col { white-space:normal; font-size:11px; color:#4F606E; line-height:1.6; max-width:500px; }

  .footer { padding:24px 48px; text-align:center; font-size:12px; color:#8093A3; border-top:1px solid #E7E7E7; background:#FFFFFF; }

  .tooltip { position:relative; z-index:1; }
  .tooltip:hover { z-index:10; }
  .tooltip:hover::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:#001323; color:#FFFFFF; padding:4px 10px; border-radius:4px; font-size:11px; white-space:nowrap; z-index:20; pointer-events:none; }

  @media (max-width:1100px) {
    .grid-2, .grid-3 { grid-template-columns:1fr; }
    .kpi-row { grid-template-columns:1fr; }
    .region-cards { grid-template-columns:repeat(2,1fr); }
    .main { padding:20px; }
    .header, .filters-bar, .footer, .advertiser-banner { padding-left:20px; padding-right:20px; }
  }

  /* Print / PDF */
  @media print {
    @page { size: portrait; margin: 8mm; }
    body { background:white !important; -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; font-size:10px; }
    .filters-bar { display:none !important; }
    .header { padding:10px 20px !important; }
    .advertiser-banner { padding:8px 20px !important; }
    .main { padding:12px 20px !important; max-width:none !important; }
    .footer { padding:10px 20px !important; }
    .section { padding:16px 20px; margin-bottom:12px; break-inside:avoid; }
    .section-header { margin-bottom:12px; padding-bottom:10px; }
    .kpi-card { break-inside:avoid; padding:16px 20px; }
    .kpi-value { font-size:28px; }
    .grid-3 { grid-template-columns:1fr 1fr 1fr !important; gap:12px; }
    .grid-2 { grid-template-columns:1fr 1fr !important; gap:12px; }
    .kpi-row { grid-template-columns:repeat(3,1fr) !important; gap:12px; margin-bottom:16px; }
    .region-cards { grid-template-columns:repeat(4,1fr) !important; }
    .fade-in { animation:none !important; opacity:1 !important; }
    .bar:hover { transform:none !important; }
    .ranked-item:hover { background:transparent !important; }
    .tooltip:hover::after { display:none !important; }
    .chart-bars { height:140px; }
    .seniority-card { margin-bottom:6px; padding:8px 10px; }
    .seniority-pct { font-size:20px; }
  }
</style>
</head>

function fmt(n) { return n == null ? "0" : Number(n).toLocaleString("en-US"); }
function pct(p, t) { return t ? Math.round((p/t)*100) : 0; }
function topN(map, n=10) { return Object.entries(map).filter(([k])=>k&&k.trim()).sort((a,b)=>b[1]-a[1]).slice(0,n); }

const SIZE_ORDER = ["Micro","Small","Medium-Small","Medium","Medium-Large","Large","XLarge","XXLarge"];
const REV_ORDER = ["Micro","Small","Medium-Small","Medium-Large","Large","XLarge","XXLarge"];

function sortByOrder(map, order) {
  // Always include every category from the order, default to 0
  return order.map(key => {
    // Find matching entry (startsWith to handle labels like "Small (10 - 49 Employees)")
    const match = Object.entries(map).find(([k]) => k && k.startsWith(key));
    return match || [key, 0];
  });
}

function getDayKey(ds) {
  try {
    if (!ds) return null;
    let d;
    if (typeof ds === "string" && ds.startsWith("Date(")) {
      const parts = ds.replace("Date(","").replace(")","").split(",").map(Number);
      d = new Date(parts[0], parts[1], parts[2]||1);
    } else { d = new Date(ds); }
    if (isNaN(d)) return null;
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  } catch { return null; }
}

function parseMulti(v) { return v ? v.split("|").map(s=>s.trim()).filter(Boolean) : []; }

function normalizePath(url) {
  if (!url) return "";
  let p = url.replace(/^https?:\/\/expertinsights\.com/,"");
  p = p.split("#")[0].split("?")[0];
  if (!p.startsWith("/")) p = "/" + p;
  if (p.length > 1 && p.endsWith("/")) p = p.slice(0,-1);
  return p.toLowerCase();
}

function processData(rows) {
  const uv=new Set(), doms=new Set(); let pv=0;
  const daily={}, urlStats={}, industryC={}, sizeC={}, revC={}, profC={}, funcC={}, senC={}, countryC={};
  const domVis={}, domPV={}, domPages={};

  // Pre-seed urlStats with all mapped advertiser paths so 0-visit pages still appear
  if (currentAdvertiser && advertiserMap[currentAdvertiser]) {
    advertiserMap[currentAdvertiser].forEach(p => {
      const path = normalizePath(p);
      if (path && !urlStats[path]) urlStats[path] = {pv:0, vis:new Set(), dom:new Set()};
    });
  }

  // Excluded domains — filtered from all stats
  const EXCLUDED_DOMAINS = new Set(["gammagroup.co"]);

  rows.forEach(r => {
    const bid=r["Bombora ID"]||"", url=r["URL"]||"", domain=r["Domain"]||"", importDate=r["Import Date"]||"";
    const country=r["Country"]||"", industry=r["Industry"]||"";
    const compSize=r["Company_Size"]||"", compRev=r["Company_Revenue"]||"";
    const profGroup=r["Professional_Group"]||"", funcArea=r["Functional_Area"]||"", seniority=r["Seniority"]||"";

    if (EXCLUDED_DOMAINS.has(domain)) return;
    pv++;
    if(bid) uv.add(bid);
    if(domain) doms.add(domain);

    const dk=getDayKey(importDate);
    if(dk){
      if(!daily[dk]) daily[dk]={pv:0,vis:new Set(),dom:new Set()};
      daily[dk].pv++; if(bid) daily[dk].vis.add(bid); if(domain) daily[dk].dom.add(domain);
    }

    if(url){
      const path=normalizePath(url);
      if(!urlStats[path]) urlStats[path]={pv:0,vis:new Set(),dom:new Set()};
      urlStats[path].pv++; if(bid) urlStats[path].vis.add(bid); if(domain) urlStats[path].dom.add(domain);
      
      // Track pages per domain
      if(domain) {
        if(!domPages[domain]) domPages[domain]={};
        if(!domPages[domain][path]) domPages[domain][path]=0;
        domPages[domain][path]++;
      }
    }

    if(industry){ const top=industry.split("|")[0].split(">")[0].trim(); if(top) industryC[top]=(industryC[top]||0)+1; }
    if(compSize) sizeC[compSize]=(sizeC[compSize]||0)+1;
    if(compRev) revC[compRev]=(revC[compRev]||0)+1;
    parseMulti(profGroup).forEach(pg=>{ profC[pg]=(profC[pg]||0)+1; });
    if(funcArea) funcC[funcArea]=(funcC[funcArea]||0)+1;
    if(seniority) {
      let senKey = seniority.trim();
      if(senKey.toLowerCase().includes("csuite") || senKey.toLowerCase().includes("c-suite")) senKey = "C-Suite";
      else if(senKey.toLowerCase().includes("board") || senKey.toLowerCase().includes("ownership")) senKey = "Management";
      senC[senKey]=(senC[senKey]||0)+1;
    }
    if(country) countryC[country]=(countryC[country]||0)+1;
    if(domain){ if(!domVis[domain]) domVis[domain]=new Set(); if(bid) domVis[domain].add(bid); domPV[domain]=(domPV[domain]||0)+1; }
  });

  const days=Object.keys(daily).sort();
  // Aggregate into weeks (Mon-Sun)
  const weekMap = {};
  days.forEach(dk => {
    const d = new Date(dk + "T00:00:00");
    const day = d.getDay(); // 0=Sun
    const diff = (day === 0 ? -6 : 1) - day; // shift to Monday
    const mon = new Date(d);
    mon.setDate(mon.getDate() + diff);
    const wk = mon.toISOString().slice(0,10);
    if (!weekMap[wk]) weekMap[wk] = { pv:0, vis:new Set(), dom:new Set() };
    weekMap[wk].pv += daily[dk].pv;
    daily[dk].vis.forEach(v => weekMap[wk].vis.add(v));
    daily[dk].dom.forEach(v => weekMap[wk].dom.add(v));
  });
  const weeks = Object.keys(weekMap).sort().map(wk => {
    const d = new Date(wk + "T00:00:00");
    const end = new Date(d); end.setDate(end.getDate() + 6);
    const label = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    return { week:wk, label, pageViews:weekMap[wk].pv, visitors:weekMap[wk].vis.size, domains:weekMap[wk].dom.size };
  });
  const urlTableAll=Object.entries(urlStats).map(([p,s])=>({path:p,pv:s.pv,visitors:s.vis.size,domains:s.dom.size})).sort((a,b)=>b.visitors-a.visitors);
  const urlTable=currentAdvertiser ? urlTableAll : urlTableAll.slice(0,15);
  const domainTable=Object.keys(domVis).map(d=>{
    const pages = domPages[d] ? Object.entries(domPages[d]) : [];
    // Extract distinct categories (first path segment)
    const cats = new Set();
    pages.forEach(([p]) => {
      const seg = p.split("/").filter(Boolean)[0];
      if (seg) cats.add(seg);
    });
    const pagesHtml = [...cats].map(c => {
      const title = c.replace(/-/g, " ").replace(/\b\w/g, ch => ch.toUpperCase());
      return title;
    }).join(", ");
    return {domain:d, visitors:domVis[d].size, pv:domPV[d]||0, pages:pagesHtml};
  }).sort((a,b)=>b.visitors-a.visitors).slice(0,15);
  const regionC={};
  const unmappedCountries={};
  Object.entries(countryC).forEach(([c,n])=>{ 
    const r=REGION_MAP[c]||"Other"; 
    regionC[r]=(regionC[r]||0)+n;
    if(r==="Other") unmappedCountries[c]=n;
  });
  if(Object.keys(unmappedCountries).length) console.log("Unmapped countries (falling into Other):", JSON.stringify(unmappedCountries));

  return {
    pageViews:pv, uniqueVisitors:uv.size, businessDomains:doms.size, weeks, urlTable, domainTable,
    industry:topN(industryC,8), companySize:sortByOrder(sizeC, SIZE_ORDER), revenue:sortByOrder(revC, REV_ORDER),
    profGroup:topN(profC,3), funcArea:topN(funcC,3), seniority:topN(senC,5),
    countries:topN(countryC,9), regions:topN(regionC,5),
  };
}

function getFilteredRows() {
  let rows = allBomboraRows;
  if (currentAdvertiser && advertiserMap[currentAdvertiser]) {
    const allowed = advertiserMap[currentAdvertiser].map(p => p.toLowerCase());
    rows = rows.filter(r => {
      const rp = normalizePath(r["URL"]||"");
      return allowed.some(ap => rp === ap || rp.startsWith(ap + "/"));
    });
  }
  const fromVal = document.getElementById("dateFrom").value;
  const toVal = document.getElementById("dateTo").value;
  if (fromVal || toVal) {
    rows = rows.filter(r => {
      const dk = getDayKey(r["Import Date"]||"");
      if (!dk) return false;
      if (fromVal && dk < fromVal) return false;
      if (toVal && dk > toVal) return false;
      return true;
    });
  }
  return rows;
}

function applyDatePreset(val) {
  const fromEl = document.getElementById("dateFrom");
  const toEl = document.getElementById("dateTo");
  const customWrap = document.getElementById("customDateRange");
  
  if (val === "custom") {
    customWrap.style.display = "flex";
    return;
  }
  customWrap.style.display = "none";
  
  if (val === "all") {
    const allDates = allBomboraRows.map(r => getDayKey(r["Import Date"]||"")).filter(Boolean).sort();
    fromEl.value = allDates.length ? allDates[0] : "";
    toEl.value = allDates.length ? allDates[allDates.length - 1] : "";
  } else if (val === "lastmonth") {
    const now = new Date();
    const from = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const to = new Date(now.getFullYear(), now.getMonth(), 0);
    fromEl.value = from.toISOString().slice(0, 10);
    toEl.value = to.toISOString().slice(0, 10);
  } else {
    const days = parseInt(val);
    const to = new Date();
    const from = new Date();
    from.setDate(from.getDate() - days);
    fromEl.value = from.toISOString().slice(0, 10);
    toEl.value = to.toISOString().slice(0, 10);
  }
  
  updateDateRangeDisplay();
  renderDashboard();
}

function onDatePresetChange() {
  applyDatePreset(document.getElementById("datePreset").value);
}

function onDateChange() {
  updateDateRangeDisplay();
  renderDashboard();
}

// ─── Render ──────────────────────────────────────────────
function renderKPI(l,v,c) {
  return `<div class="kpi-card fade-in"><div class="accent" style="background:${c}"></div><div class="kpi-label">${l}</div><div class="kpi-value">${fmt(v)}</div></div>`;
}
function renderHBars(data) {
  const t = data.reduce((s,[,v]) => s+v, 0);
  const maxPct = Math.max(...data.map(([,v]) => pct(v,t)), 1);
  return `<div class="hbar-list">${data.map(([l,v], i) => {
    const p = pct(v,t);
    const barW = Math.max(2, (p / maxPct) * 100);
    return `<div class="hbar-row"><span class="hbar-label">${l}</span><div class="hbar-bar-wrap"><div class="hbar-bar" style="width:${barW}%;background:${PALETTE[i % PALETTE.length]}"></div><span class="hbar-value">${p}%</span></div></div>`;
  }).join("")}</div>`;
}
function renderTreemap(data) {
  const t = data.reduce((s,[,v]) => s+v, 0);
  const maxPct = Math.max(...data.map(([,v]) => pct(v,t)), 1);
  return `<div class="treemap">${data.map(([l,v], i) => {
    const p = pct(v,t);
    // Width based on proportion — min 30%, scale between 30-100% of container
    const widthPct = Math.max(30, (p / maxPct) * 100);
    // Height scales too — bigger items get taller
    const h = Math.max(48, Math.round(36 + (p / maxPct) * 40));
    return `<div class="treemap-tile" style="flex:${Math.max(1, Math.round(p/maxPct * 10))} 1 calc(${widthPct > 60 ? '100%' : widthPct > 35 ? '46%' : '30%'} - 4px);height:${h}px;background:${PALETTE[i % PALETTE.length]}"><div class="treemap-tile-pct">${p}%</div><div class="treemap-tile-label">${l}</div></div>`;
  }).join("")}</div>`;
}
function renderDailyChart(weeks) {
  if(!weeks.length) return "<p style='color:#4F606E'>No weekly data available</p>";
  
  const W = 900, H = 280, padL = 50, padR = 20, padT = 30, padB = 40;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const n = weeks.length;
  
  const allVals = weeks.flatMap(d => [d.pageViews, d.visitors, d.domains]);
  const mx = Math.max(...allVals, 1);
  const niceMax = Math.ceil(mx * 1.15 / (Math.pow(10, Math.floor(Math.log10(mx))))) * Math.pow(10, Math.floor(Math.log10(mx)));
  const gridLines = 5;
  
  function x(i) { return padL + (n > 1 ? (i / (n - 1)) * chartW : chartW / 2); }
  function y(v) { return padT + chartH - (v / niceMax) * chartH; }
  
  function fmtLabel(v) { return v >= 1000 ? (v/1000).toFixed(v >= 10000 ? 0 : 1) + "k" : v; }
  
  function polyline(key, color) {
    const pts = weeks.map((d, i) => `${x(i)},${y(d[key])}`).join(" ");
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />`;
  }
  
  function dotsAndLabels(key, color, yOffset) {
    return weeks.map((d, i) => {
      const cx = x(i), cy = y(d[key]);
      return `<circle cx="${cx}" cy="${cy}" r="3.5" fill="${color}" stroke="#FFFFFF" stroke-width="1.5" />
        <text x="${cx}" y="${cy + yOffset}" text-anchor="middle" font-size="9" font-weight="600" fill="${color}">${fmtLabel(d[key])}</text>`;
    }).join("");
  }
  function dotsOnly(key, color) {
    return weeks.map((d, i) => {
      const cx = x(i), cy = y(d[key]);
      return `<circle cx="${cx}" cy="${cy}" r="3.5" fill="${color}" stroke="#FFFFFF" stroke-width="1.5" />`;
    }).join("");
  }
  
  // Grid lines & Y labels
  let grid = "";
  for (let i = 0; i <= gridLines; i++) {
    const val = Math.round((niceMax / gridLines) * i);
    const yPos = y(val);
    grid += `<line x1="${padL}" y1="${yPos}" x2="${W - padR}" y2="${yPos}" stroke="#EEF1F4" stroke-width="1" />`;
    grid += `<text x="${padL - 8}" y="${yPos + 4}" text-anchor="end" font-size="10" fill="#8093A3">${fmtLabel(val)}</text>`;
  }
  
  // X labels
  let xLabels = "";
  for (let i = 0; i < n; i++) {
    xLabels += `<text x="${x(i)}" y="${H - 6}" text-anchor="middle" font-size="10" fill="#8093A3">${weeks[i].label}</text>`;
  }
  
  // Hover areas
  let hoverAreas = "";
  const sliceW = n > 1 ? chartW / (n - 1) : chartW;
  weeks.forEach((d, i) => {
    const xPos = x(i);
    hoverAreas += `<rect x="${xPos - sliceW/2}" y="${padT}" width="${sliceW}" height="${chartH}" fill="transparent" class="tooltip" data-tip="Wk ${d.label}: PV ${fmt(d.pageViews)} · Visitors ${fmt(d.visitors)} · Domains ${fmt(d.domains)}" />`;
  });
  
  return `<div class="line-chart-wrap">
    <svg class="line-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      ${grid}
      ${xLabels}
      ${polyline("pageViews", "#006BC1")}
      ${polyline("visitors", "#012747")}
      ${polyline("domains", "#E0B51A")}
      ${dotsAndLabels("pageViews", "#006BC1", -10)}
      ${dotsOnly("visitors", "#012747")}
      ${dotsOnly("domains", "#E0B51A")}
      ${hoverAreas}
    </svg>
  </div>
  <div class="chart-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#006BC1"></div>Page Views</div>
    <div class="legend-item"><div class="legend-dot" style="background:#012747"></div>Unique Visitors</div>
    <div class="legend-item"><div class="legend-dot" style="background:#E0B51A"></div>Business Domains</div>
  </div>`;
}
function renderVisitorProfile(seniority, profGroup, funcArea) {
  const senTotal = seniority.reduce((s,[,v]) => s+v, 0);
  const profTotal = profGroup.reduce((s,[,v]) => s+v, 0);
  const funcTotal = funcArea.reduce((s,[,v]) => s+v, 0);
  
  const senColors = {"Non-management":"#012747","Management":"#006BC1","C-Suite":"#BF0A61"};
  const defaultSenColor = "#8093A3";

  // Stacked bar
  const bar = seniority.map(([l,v]) => {
    const p = pct(v, senTotal);
    const col = senColors[l] || defaultSenColor;
    return `<div class="stacked-seg" style="flex:${Math.max(1,p)};background:${col}">${p}%</div>`;
  }).join("");
  const legend = seniority.map(([l,v]) => {
    const col = senColors[l] || defaultSenColor;
    return `<div class="stacked-legend-item"><div class="stacked-legend-dot" style="background:${col}"></div>${l}</div>`;
  }).join("");

  // Compact lists
  const profList = profGroup.map(([l,v]) => {
    const p = pct(v, profTotal);
    return `<div class="compact-row"><span class="compact-label">${l}</span><span class="compact-val">${p}%</span></div>`;
  }).join("");
  const funcList = funcArea.map(([l,v]) => {
    const p = pct(v, funcTotal);
    return `<div class="compact-row"><span class="compact-label">${l}</span><span class="compact-val">${p}%</span></div>`;
  }).join("");

  return `<div class="stacked-bar-wrap">
    <div class="profile-col-title">Seniority</div>
    <div class="stacked-bar">${bar}</div>
    <div class="stacked-legend">${legend}</div>
  </div>
  <div class="profile-cols">
    <div>
      <div class="profile-col-title">Professional Group</div>
      <div class="compact-list">${profList}</div>
    </div>
    <div>
      <div class="profile-col-title">Functional Area</div>
      <div class="compact-list">${funcList}</div>
    </div>
  </div>`;
}
function renderRegions(data) {

  const s=order.map(r=>[r,data.find(([k])=>k===r)?.[1]||0]).filter(([,v])=>v>0);

function getDateRangeLabel() {
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  if (!from && !to) return "";
  const fmtD = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  if (from && to) return `${fmtD(from)} – ${fmtD(to)}`;
  if (from) return `From ${fmtD(from)}`;
  return `Until ${fmtD(to)}`;
}

function updateDateRangeDisplay() {

async function generatePDFBlob() {
  const { jsPDF } = window.jspdf;
  const pageW = 210;
  const margin = 6;
  const contentW = pageW - margin * 2;
  const captureW = 1200;
  const gap = 4;

  const allEls = document.querySelectorAll("*");
  const savedOpacity = [];
  allEls.forEach(el => {
    const cs = getComputedStyle(el);
    if (cs.opacity !== "1") {
      savedOpacity.push({ el, orig: el.style.opacity });
      el.style.opacity = "1";
    }
  });

  const styleOverride = document.createElement("style");
  styleOverride.id = "pdf-override";
  styleOverride.textContent = `
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
      opacity: 1 !important;
    }
    .fade-in { opacity: 1 !important; }
    .kpi-row { grid-template-columns: repeat(3,1fr) !important; }
    .grid-2 { grid-template-columns: 1fr 1fr !important; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr !important; }
    .region-cards { grid-template-columns: repeat(4,1fr) !important; }
    .kpi-card .accent { height: 4px !important; }
    #loadTime { display: none !important; }
    .main { width: ${captureW}px !important; max-width: ${captureW}px !important; padding: 24px 32px !important; margin: 0 !important; }
  `;
  document.head.appendChild(styleOverride);

  // Pre-render SVG logo to PNG for html2canvas compatibility
  const logoImg = document.querySelector(".header-left img");
  let origLogoSrc = null;
  if (logoImg) {
    origLogoSrc = logoImg.src;
    try {
      const cvs = document.createElement("canvas");
      const scale = 4;
      cvs.width = logoImg.naturalWidth * scale;
      cvs.height = logoImg.naturalHeight * scale;
      const ctx = cvs.getContext("2d");
      ctx.drawImage(logoImg, 0, 0, cvs.width, cvs.height);
      logoImg.src = cvs.toDataURL("image/png");
    } catch(e) { console.warn("Logo pre-render failed:", e); }
  }

  // Wait for styles to apply
  await new Promise(r => setTimeout(r, 100));

  const captures = [];

  async function captureSection(el, opts = {}) {
    if (!el || el.offsetHeight === 0) return;
    const canvas = await html2canvas(el, {
      scale: 2, useCORS: true, logging: false,
      backgroundColor: opts.bg || null,
      width: captureW, windowWidth: captureW,
    });
    const imgData = canvas.toDataURL("image/jpeg", 0.95);
    const imgH = (canvas.height / canvas.width) * contentW;
    captures.push({ imgData, imgH, gap: opts.gap !== undefined ? opts.gap : gap, fullWidth: opts.fullWidth || false });
  }

  const header = document.querySelector(".header");
  const banner = document.getElementById("advertiserBanner");
  const mainEl = document.querySelector(".main");
  const footer = document.querySelector(".footer");

  await captureSection(header, { bg: "#001323", gap: 0, fullWidth: true });
  if (banner && banner.classList.contains("active")) {
    await captureSection(banner, { bg: "#E5F0F9", gap: 2, fullWidth: true });
  }
  await captureSection(mainEl, { bg: "#F4F6F8", gap: 0 });
  await captureSection(footer, { bg: "#F4F6F8", gap: 0, fullWidth: true });

  let totalH = 0;
  captures.forEach(c => {
    totalH += (c.fullWidth ? (c.imgH / contentW) * pageW : c.imgH) + c.gap;
  });

  const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: [pageW, totalH] });
  pdf.setFillColor(244, 246, 248);
  pdf.rect(0, 0, pageW, totalH, "F");
  let curY = 0;

  captures.forEach(c => {
    if (c.fullWidth) {
      const h = (c.imgH / contentW) * pageW;
      pdf.addImage(c.imgData, "JPEG", 0, curY, pageW, h);
      curY += h + c.gap;
    } else {
      pdf.addImage(c.imgData, "JPEG", margin, curY, contentW, c.imgH);
      curY += c.imgH + c.gap;
    }
  });

  // Cleanup
  document.head.removeChild(styleOverride);
  savedOpacity.forEach(({ el, orig }) => { el.style.opacity = orig; });
  if (logoImg && origLogoSrc) logoImg.src = origLogoSrc;

  return pdf.output("blob");
}

function getPDFFilename(advertiser) {
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  const dateSuffix = (from && to) ? `_${from}_to_${to}` : (from ? `_from_${from}` : (to ? `_to_${to}` : ""));
  if (advertiser) {
    return `Audience_Report_${advertiser.replace(/[^a-zA-Z0-9]/g, "_")}${dateSuffix}.pdf`;
  }
  return `Audience_Report_All${dateSuffix}.pdf`;
}

async function downloadPDF() {
  const btn = document.getElementById("pdfBtn");
  btn.textContent = "⏳ Generating...";
  btn.disabled = true;

  try {
    const blob = await generatePDFBlob();
    saveAs(blob, getPDFFilename(currentAdvertiser));
  } catch (err) {
    console.error("PDF generation error:", err);
    alert("PDF generation failed. Check console for details.");
  }

  btn.textContent = "⤓ Save as PDF";
  btn.disabled = false;
}

async function downloadAllPDFs() {
  const btn = document.getElementById("pdfAllBtn");
  const pdfBtn = document.getElementById("pdfBtn");
  const select = document.getElementById("advertiserSelect");
  btn.disabled = true;
  pdfBtn.disabled = true;
  select.disabled = true;

  try {
    const zip = new JSZip();
    const advertisers = Object.keys(advertiserMap);
    const total = advertisers.length + 1; // +1 for "All"
    let count = 0;

    // First: generate "All" report
    btn.textContent = `⏳ Generating 1 of ${total}...`;
    currentAdvertiser = "";
    select.value = "";
    document.getElementById("limitDomains").checked = false;
    renderDashboard();
    await new Promise(r => setTimeout(r, 300));
    const allBlob = await generatePDFBlob();
    zip.file(getPDFFilename(""), allBlob);
    count++;

    // Then: each advertiser
    for (const adv of advertisers) {
      count++;
      btn.textContent = `⏳ Generating ${count} of ${total}...`;
      currentAdvertiser = adv;
      select.value = adv;
      document.getElementById("limitDomains").checked = !!limitDomainsMap[adv];
      renderDashboard();
      await new Promise(r => setTimeout(r, 300));
      const blob = await generatePDFBlob();
      zip.file(getPDFFilename(adv), blob);
    }

    // Generate and download ZIP
    btn.textContent = "⏳ Creating ZIP...";
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;
    const zipSuffix = (from && to) ? `_${from}_to_${to}` : "";
    const zipBlob = await zip.generateAsync({ type: "blob" });
    saveAs(zipBlob, `Audience_Reports${zipSuffix}.zip`);

    // Restore to "All" view
    currentAdvertiser = "";
    select.value = "";
    renderDashboard();

  } catch (err) {
    console.error("Batch PDF error:", err);
    alert("Batch PDF generation failed. Check console for details.");
  }

  btn.textContent = "⤓ Download All Reports";
  btn.disabled = false;
  pdfBtn.disabled = false;
  select.disabled = false;
}

// ─── JSONP loader ────────────────────────────────────────
function loadSheetJSONP(sheetId, sheetName) {
  return new Promise((resolve, reject) => {
    const cb = "gviz_" + Math.random().toString(36).slice(2);
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}&headers=1`;
    const tm = setTimeout(() => { delete window[cb]; if(sc.parentNode) sc.parentNode.removeChild(sc); reject(new Error("Timeout loading sheet")); }, 20000);

    window[cb] = function(resp) {
      clearTimeout(tm); delete window[cb]; if(sc.parentNode) sc.parentNode.removeChild(sc);
      try {
        if (resp.status === "error") throw new Error(resp.errors.map(e=>e.message).join(", "));
        const headers = resp.table.cols.map(c=>c.label);
        const rows = resp.table.rows.map(row => {
          const obj = {};
          row.c.forEach((cell,i) => {
            if(!cell){obj[headers[i]]="";return;}
            const v=cell.v;
            if(typeof v==="string"&&v.startsWith("Date(")){
              const parts=v.replace("Date(","").replace(")","").split(",").map(Number);
              obj[headers[i]]=new Date(parts[0],parts[1],parts[2]||1,parts[3]||0,parts[4]||0,parts[5]||0).toISOString();
            } else {
              obj[headers[i]]=cell.f!=null?String(cell.f):(v!=null?String(v):"");
            }
          });
          return obj;
        });
        resolve(rows);
      } catch(e){ reject(e); }
    };

    const sc=document.createElement("script"); sc.src=url;
    sc.onerror=function(){clearTimeout(tm);delete window[cb];reject(new Error("Network error"));};
    document.body.appendChild(sc);
  });
}

// ─── Parse advertiser sheet ──────────────────────────────
function parseAdvertiserSheet(rows) {
  const map = {};
  if (rows.length > 0) {
    console.log("Advertiser sheet - first row keys:", Object.keys(rows[0]));
    console.log("Advertiser sheet - first row:", JSON.stringify(rows[0]));
  }
  rows.forEach(r => {
    const name = (r["Advertiser"]||"").trim();
    if (!name) return;
    const urls = [];
    for (let i=1; i<=33; i++) {
      // Try both "URL1" and "URL 1" formats
      let u = (r[`URL${i}`] || r[`URL ${i}`] || "").trim();
      if (!u) continue;
      // Strip domain if full URL was provided
      u = u.replace(/^https?:\/\/expertinsights\.com/, "");
      if (!u.startsWith("/")) u = "/" + u;
      if (u.length > 1 && u.endsWith("/")) u = u.slice(0,-1);
      urls.push(u);
    }
    if (urls.length) map[name] = urls;
  });
  console.log("Parsed advertiser map:", JSON.stringify(map));
  return map;
}

function parseAdvertiserSettings(rows) {
  const map = {};
  rows.forEach(r => {
    const name = (r["Advertiser"]||"").trim();
    if (!name) return;
    const val = (r["Limit_Domains"]||"").trim().toUpperCase();
    map[name] = val === "TRUE";
  });
  console.log("Parsed limit domains map:", JSON.stringify(map));
  return map;
}

function populateDropdown() {
  const sel = document.getElementById("advertiserSelect");
  const names = Object.keys(advertiserMap).sort();
  sel.innerHTML = `<option value="">All (no filter)</option>` + names.map(n=>`<option value="${n}">${n}</option>`).join("");
  sel.disabled = false;
}

// ─── Load ────────────────────────────────────────────────
async function loadData() {
  const loading=document.getElementById("loadingScreen"), error=document.getElementById("errorScreen"), dash=document.getElementById("dashboard");
  loading.style.display="flex"; error.style.display="none"; dash.style.display="none";
  try {
    const [bomboraRows, advRows, settingsRows] = await Promise.all([
      loadSheetJSONP(BOMBORA_SHEET_ID, "Sheet1"),
      loadSheetJSONP(ADVERTISER_SHEET_ID, "Sheet1"),
      loadSheetJSONP(ADVERTISER_SHEET_ID, "Sheet2"),
    ]);
    if (!bomboraRows.length) throw new Error("Bombora sheet returned no data");
    allBomboraRows = bomboraRows;
    advertiserMap = parseAdvertiserSheet(advRows);
    limitDomainsMap = parseAdvertiserSettings(settingsRows);
    populateDropdown();
    if (currentAdvertiser && advertiserMap[currentAdvertiser]) {
      document.getElementById("advertiserSelect").value = currentAdvertiser;
    } else { currentAdvertiser = ""; }
    loading.style.display = "none";
    // Default to Last 30 days
    applyDatePreset("30");
  } catch(err) {
    loading.style.display="none"; error.style.display="flex";
    document.getElementById("errorMsg").textContent = err.message;
  }
}

loadData();
